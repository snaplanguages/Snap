            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;

            justify-content: space-between;

            font-size: 22px;
            font-weight: 800;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 16px;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-outline {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text-main);
        }

        .btn-outline:hover { background: var(--bg-body); border-color: #cbd5e1; }

            background: var(--primary);
            color: white;
            box-shadow: 0 4px 0 var(--primary-dark);
        }

        .btn-primary:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .passage-section {
            flex: 6;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border);
            background: #fff;
        }

        .passage-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow-y: auto;
        }

            padding: 30px;
            line-height: 1.8;
            font-size: 17px;
            overflow-y: auto;
        }

        .col-vie { background: #fafaf9; color: #57534e; }

            color: var(--primary);

            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 10px;
        }

        .question-section {
            flex: 4;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-body);

            border-radius: 4px;
            transition: all 0.4s ease;
            padding: 2px;
            border: 1px solid transparent;
        }

            background-color: var(--highlight) !important;
            border-color: #eab308;
            transform: scale(1.02);

            color: #1e3a8a;

            font-weight: 700;
            margin-bottom: 15px;
            color: #0f172a;

            font-style: italic;
            margin-bottom: 20px;

            display: flex;

        .option.is-correct {
            background: var(--correct-bg);
            border-color: var(--correct);
        }

        .option.is-correct .opt-en { color: #166534; }

            margin-top: 20px;
            padding: 20px;
            background: var(--primary-light);
            border-radius: 12px;
            border-left: 5px solid var(--primary);

</head>

            currentPassageIdx = newIdx;
            renderPassage(currentPassageIdx);
            
            // Tự động cuộn lên đầu khi sang đoạn mới
            document.querySelector('.passage-grid').scrollTop = 0;
            document.getElementById('questions-container').scrollTop = 0;
        }
    }

    // HÀM CUỘN ĐẾN DẪN CHỨNG VÀ TẠO HIỆU ỨNG PHÁT SÁNG
    function scrollToEvidence(evId) {
        const evElement = document.getElementById(evId);
        if(evElement) {
            // Cuộn đoạn văn chứa dẫn chứng vào giữa màn hình
            evElement.scrollIntoView({behavior: "smooth", block: "center"});
            
            // Xóa class để ép trình duyệt chạy lại animation
            evElement.classList.remove("focus-blink");
            void evElement.offsetWidth; // Trigger reflow
            
            // Thêm class phát sáng highlight
            evElement.classList.add("focus-blink");
            
            // Gỡ bỏ hiệu ứng sau 2 giây
            setTimeout(() => evElement.classList.remove("focus-blink"), 2000);
        }
    }

    // KHỞI CHẠY KHI TẢI TRANG
    window.onload = () => {
        renderPassage(0);
    };
</script>

</body>
</html>
