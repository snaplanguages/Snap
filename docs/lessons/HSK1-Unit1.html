<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK 1 - Bài 1: 你好 | SnapChinese</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B8B;
            --primary-dark: #D81B60;
            --secondary: #ff8a00;
            --bg-color: #FFF0F5;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --hanzi-color: #D81B60;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFB6C1 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 50px;
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
        }

        .branding {
            width: 100%; background: #fff; text-align: center; padding: 6px 0;
            font-size: 0.75rem; font-weight: 800; color: var(--primary-dark);
            letter-spacing: 1px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-transform: uppercase;
        }

        .header {
            width: 100%; max-width: 800px; padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border-radius: 0 0 20px 20px;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.3);
        }

        .btn-back {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 8px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.5);
            transition: all 0.2s; cursor: pointer;
        }
        .btn-back:hover { background: rgba(255,255,255,0.3); }

        .header h2 { font-size: 1.1rem; text-align: center; flex: 1; margin: 0 10px; }
        .header-spacer { width: 90px; }

        .tabs {
            display: flex; justify-content: space-between; gap: 3px;
            margin: 20px auto; background: white; padding: 5px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 95%; max-width: 700px;
        }

        .tab-btn {
            flex: 1; border: none; background: transparent;
            padding: 8px 0; border-radius: 25px;
            font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
            text-align: center; white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary); color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 139, 0.4);
        }

        .section { display: none; width: 100%; max-width: 800px; padding: 0 15px; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Hán Tự Grid */
        .hanzi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .hanzi-flip-card { background: transparent; width: 100%; height: 390px; perspective: 1000px; }
        .hanzi-flip-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 20px; }
        .hanzi-flip-card.flipped .hanzi-flip-inner { transform: rotateY(180deg); }
        .hanzi-front, .hanzi-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; padding: 20px; background: var(--card-bg); box-shadow: 0 8px 20px rgba(216, 27, 96, 0.08); overflow: hidden; }
        .hanzi-front { border-top: 6px solid var(--primary); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; }
        .hanzi-back { transform: rotateY(180deg); border-top: 6px solid var(--secondary); display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 16px; }
        .char-display { font-family: var(--font-cn); font-size: 4rem; color: var(--hanzi-color); line-height: 1.2; font-weight: 400; margin: 5px 0; }
        .pinyin {
            background: #ffe6ee; color: var(--primary-dark); padding: 4px 15px; border-radius: 12px;
            font-weight: 800; font-size: 1.1rem; display: inline-block; margin: 5px 0;
        }
        .meaning { font-size: 1.05rem; font-weight: bold; color: var(--text-muted); margin: 5px 0; }
        .memo { font-size: 0.9rem; background: #fff8e1; padding: 10px; border-radius: 10px; color: #5d4037; text-align: left; border-left: 4px solid var(--secondary); line-height: 1.5; width: 100%; margin: 5px 0; }
        .flip-hint { font-size: 0.78rem; color: #bbb; margin-top: auto; }
        .back-title { font-weight: 800; font-size: 0.88rem; color: var(--primary-dark); }
        .writer-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .writer-mini-controls { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .writer-btn {
            background: white; border: 1.5px solid var(--primary); color: var(--primary-dark);
            padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.8rem;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
        }
        .writer-btn:hover, .writer-btn:active { background: var(--primary); color: white; }
        .writer-feedback { font-size: 0.8rem; min-height: 18px; font-weight: 700; margin-top: 5px; }
        .back-flip-hint { font-size: 0.75rem; color: #bbb; cursor: pointer; margin-top: 5px; }

        /* Từ vựng Flashcard */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .flashcard { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.5s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px;
        }
        .flashcard-front { background: #fff; border: 2px solid var(--primary); box-shadow: 0 4px 10px rgba(216, 27, 96, 0.08); }
        .flashcard-front .word-cn { font-family: var(--font-cn); font-size: 4rem; color: var(--text-main); font-weight: 400; }
        .flashcard-front .hint { position: absolute; bottom: 10px; font-size: 0.8rem; color: #aaa; }
        .flashcard-back { background: #fffde7; transform: rotateY(180deg); border: 2px solid var(--secondary); box-shadow: 0 4px 10px rgba(216, 27, 96, 0.08); }
        .flashcard-back .py { font-size: 1.3rem; font-weight: bold; color: #1976d2; margin-bottom: 5px; }
        .flashcard-back .mn { font-size: 1.2rem; font-weight: 800; color: #e65100; margin-bottom: 10px; }
        .example-box { background: white; padding: 10px; border-radius: 10px; width: 100%; text-align: left;}
        .ex-cn { font-family: var(--font-cn); font-size: 1.05rem; color: #333; margin-bottom: 2px; }
        .ex-py { font-size: 0.85rem; color: #666; margin-bottom: 2px; }
        .ex-vn { font-size: 0.85rem; color: var(--primary-dark); font-style: italic; }

        /* Game / Quiz */
        .game-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(216, 27, 96, 0.08); text-align: center; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: 800; color: var(--primary-dark); font-size: 1rem; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 25px; color: var(--text-muted); line-height: 1.4; }
        .question-highlight { font-family: var(--font-cn); font-size: 2.5rem; color: var(--primary-dark); display: block; margin: 10px 0; font-weight: normal; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: #f8f9fa; border: 2px solid #e0e0e0; padding: 15px; border-radius: 12px;
            font-size: 1.1rem; font-weight: bold; color: #424242; cursor: pointer; transition: all 0.2s; font-family: var(--font-cn);
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.correct { background: #4CAF50; color: white; border-color: #388E3C; }
        .option-btn.wrong { background: #F44336; color: white; border-color: #D32F2F; }

        /* Quiz Explanation Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: center; animation: popIn 0.3s; border: 3px solid var(--primary); }
        .modal-icon { font-size: 4rem; margin-bottom: 10px; line-height: 1; }
        .modal-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .modal-title.t-correct { color: #4CAF50; }
        .modal-title.t-wrong { color: #F44336; }
        .modal-desc { font-size: 1.05rem; color: #555; margin-bottom: 20px; line-height: 1.5; }
        .btn-next { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Game Result */
        .game-result { display: none; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
        .score-circle {
            width: 85px; height: 85px; border-radius: 50%; border: 5px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: var(--primary-dark); margin: 0; background: #fff;
        }
        .result-details {
            width: 100%; background: #f8f9fa; border-radius: 15px; padding: 15px; margin: 10px 0;
            text-align: left; font-size: 0.95rem; color: #424242; max-height: 280px; overflow-y: auto; border: 1px solid #e0e0e0;
        }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 8px 0; }
        .stat-row:last-child { border-bottom: none; }
        .q-breakdown { margin-top: 15px; }
        .q-item { margin-bottom: 8px; padding: 12px; border-radius: 10px; background: white; border: 1px solid #eee; border-left: 5px solid; }
        .q-item.wrong { border-left-color: #F44336; }
        .q-text { font-weight: 700; margin-bottom: 5px; line-height: 1.4; color: var(--text-muted);}
        .q-text .question-highlight { font-size: 1.1rem; display: inline; color: var(--hanzi-color); font-weight: 800; margin: 0 2px;}

        /* Actions */
        .action-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 15px; }
        .action-buttons .row { display: flex; gap: 12px; width: 100%; }
        .btn-play-again { flex: 1; background: #fff; color: var(--text-muted); border: 2px solid #ccc; padding: 14px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; transition: 0.2s;}
        .btn-play-again:active { background: #eee; transform: scale(0.98); }
        .btn-next-lesson { flex: 1; background: linear-gradient(135deg, #ff9800, #ff5722); color: white; border: none; padding: 14px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; display: none; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3); transition: 0.2s;}
        .btn-next-lesson:active { transform: scale(0.98); }
        .action-buttons-bottom { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-screenshot { width: 100%; background: linear-gradient(135deg, #00BCD4, #0288D1); color: white; border: none; padding: 15px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(2, 136, 209, 0.3); transition: 0.2s;}
        .btn-screenshot:active { transform: scale(0.98); }
        .btn-menu { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 15px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; text-decoration: none; text-align: center; font-size: 1.05rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3); display: block;}
        .btn-menu:active { transform: scale(0.98); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); z-index: 9999;
            display: none; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: bold; color: var(--primary-dark);
        }

        /* --- TOAST & SNAP POPUP --- */
        .toast-box { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; pointer-events: none; }
        .toast { background: white; color: var(--text-main); padding: 15px 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(216, 27, 96, 0.15); border-left: 6px solid var(--primary); font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #F44336; }
        .toast.warning { border-left-color: #ff8a00; }
        .toast-icon { font-size: 1.2rem; }

        .modal-overlay-snap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 10001; justify-content: center; align-items: center; }
        .snap-popup-box { background: white; padding: 35px 25px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; border: 3px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: popIn 0.3s; }
        .snap-popup-icon { font-size: 45px; margin-bottom: 15px; }
        .snap-popup-title { color: var(--primary-dark); font-weight: 900; font-size: 1.5rem; margin-top:0; margin-bottom: 12px; }
        .snap-popup-msg { margin-bottom: 25px; font-weight: 600; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
        .snap-btn-container { display: flex; gap: 15px; justify-content: center; }
        .snap-btn-confirm { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; width: 100%; }
        .snap-btn-confirm:hover { background: var(--primary-dark); transform: translateY(-2px); }

        @media (max-width: 520px) {
            .hanzi-grid { grid-template-columns: 1fr; }
            .hanzi-flip-card { height: 380px; }
            .char-display { font-size: 3.5rem; }
        }
        @media (min-width: 520px) {
            .action-buttons-bottom { flex-direction: row; }
            .btn-screenshot, .btn-menu { flex: 1; }
        }
      /* =========================================
           RESPONSIVE DESIGN CHO HSK1-UNIT1.HTML (BÀI HỌC)
           ========================================= */
        /* Tablet & Điện thoại to (dưới 768px) */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; border-radius: 0 0 15px 15px; padding: 15px;}
            .header h2 { margin: 5px 0; font-size: 1.2rem;}
            .header-spacer { display: none; }
            .btn-back { align-self: flex-start; }
            
            .tabs { width: 100%; flex-wrap: wrap; border-radius: 15px; }
            .tab-btn { padding: 10px 5px; font-size: 0.85rem; border-radius: 10px; }
            
            .hanzi-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            
            .action-buttons-bottom { flex-direction: column; }
            .btn-screenshot, .btn-menu { width: 100%; }
        }

        /* Điện thoại nhỏ (dưới 480px) */
        @media (max-width: 480px) {
            .btn-back { width: 100%; justify-content: center; }
            .tab-btn { font-size: 0.75rem; }
            
            .hanzi-flip-card { height: 380px; }
            .char-display { font-size: 3.5rem; }
            
            .game-container { padding: 15px; }
            .question-text { font-size: 1.05rem; }
            .option-btn { font-size: 1rem; padding: 12px; }
            
            .flashcard { height: 280px; } /* Tăng chiều cao để chữ không bị tràn */
            .flashcard-front .word-cn { font-size: 3rem; }
            .flashcard-back .py { font-size: 1.1rem; }
            .flashcard-back .mn { font-size: 1.05rem; }
            
            .score-circle { width: 70px; height: 70px; font-size: 1.5rem; }
        }
    </style>
</head>

<script>
    // ========== TOAST & POPUP ==========
    function showToast(message, type = 'info') {
        const toastBox = document.getElementById('toastBox');
        const toast = document.createElement('div');
        toast.classList.add('toast', type);

        let icon = '🌸';
        if (type === 'success') icon = '✅';
        if (type === 'error') icon = '❌';
        if (type === 'warning') icon = '⚠️';

        toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;
        toastBox.appendChild(toast);

        const sound = document.getElementById('toastSound');
        if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }

        setTimeout(() => { toast.classList.add('show'); }, 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => { toast.remove(); }, 400);
        }, 3000);
    }

    const SnapPopup = {
        show: function({ title, message, icon = '✨' }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('snapPopupOverlay');
                document.getElementById('snapPopupTitle').innerText = title;
                document.getElementById('snapPopupMessage').innerText = message;
                document.getElementById('snapPopupIcon').innerText = icon;
                
                overlay.style.display = 'flex';
                
                document.getElementById('snapPopupBtnConfirm').onclick = () => {
                    overlay.style.display = 'none';
                    resolve(true);
                };
            });
        }
    };

    // ========== BẢO MẬT CƠ BẢN ==========
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
            (e.ctrlKey && ['u','s','p','U','S','P'].includes(e.key))) {
            e.preventDefault();
        }
    });

    // ========== DATA FETCHING ==========
    const API_URL = 'https://script.google.com/macros/s/AKfycbxkFrptcWNvqxKomUjDNc0g1W7ZC5gWKadI4PBV4EDG-AKp7zaE93qoOokNw67TrHCOgg/exec?lesson=1&key=khu-vuon-tieng-trung-2026';
    const CACHE_KEY = 'hsk1_lesson1_v5';
    const CACHE_DURATION = 60 * 60 * 1000;

    let hanziData = [], vocabData = [], quizQuestions = [];

    async function loadData() {
        document.getElementById('loading').style.display = 'flex';
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
            try {
                const parsed = JSON.parse(cached);
                if (parsed.timestamp && (Date.now() - parsed.timestamp) < CACHE_DURATION) {
                    hanziData = parsed.hanzi; vocabData = parsed.vocab; quizQuestions = parsed.quiz;
                    document.getElementById('loading').style.display = 'none';
                    renderAll(); return;
                }
            } catch(e) {}
        }

        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            hanziData = data.hanzi.map(item => ({ char: item['Hán tự'], pinyin: item['Pinyin'], meaning: item['Nghĩa'], memo: item['Mẹo nhớ'] || '' }));
            vocabData = data.vocab.map(item => ({ word: item['Từ'], pinyin: item['Pinyin'], meaning: item['Nghĩa'], ex_cn: item['Ví dụ (CN)'] || '', ex_py: item['Ví dụ (PY)'] || '', ex_vn: item['Ví dụ (VN)'] || '' }));
            quizQuestions = data.quiz.map(item => ({ q: item['Câu hỏi'], options: [item['A'], item['B'], item['C'], item['D']], answer: parseInt(item['Đáp án (0-3)']), exp: item['Giải thích'] }));
            
            localStorage.setItem(CACHE_KEY, JSON.stringify({ hanzi: hanziData, vocab: vocabData, quiz: quizQuestions, timestamp: Date.now() }));
            
            document.getElementById('loading').style.display = 'none';
            renderAll();
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            if (cached) {
                try {
                    const parsed = JSON.parse(cached);
                    hanziData = parsed.hanzi; vocabData = parsed.vocab; quizQuestions = parsed.quiz;
                    renderAll(); return;
                } catch(e) {}
            }
            SnapPopup.show({ title: 'Lỗi tải dữ liệu', message: 'Không thể tải dữ liệu bài học. Vui lòng kiểm tra kết nối mạng và thử lại.', icon: '❌' });
        }
    }

    // ========== ÂM THANH ==========
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    var audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type) {
        initAudio();
        var osc = audioCtx.createOscillator(), gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        var now = audioCtx.currentTime;
        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.15);
            osc.frequency.setValueAtTime(659.25, now + 0.3); osc.frequency.setValueAtTime(880, now + 0.45);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(now); osc.stop(now + 0.8);
        }
    }
    document.body.addEventListener('click', initAudio, { once: true });

    // ========== RENDER ==========
    var writerInstances = {};

    function renderAll() { renderHanziCards(); renderVocabCards(); }

    function renderHanziCards() {
        var container = document.getElementById('hanzi-container');
        container.innerHTML = hanziData.map(function(item) {
            return '<div class="hanzi-flip-card" id="card-' + item.char + '">' +
                '<div class="hanzi-flip-inner">' +
                    '<div class="hanzi-front" onclick="flipCard(\'' + item.char + '\')">' +
                        '<div class="char-display">' + item.char + '</div>' +
                        '<div class="pinyin">' + item.pinyin + '</div>' +
                        '<div class="meaning">' + item.meaning + '</div>' +
                        '<div class="memo">💡 <b>Mẹo nhớ:</b> ' + item.memo + '</div>' +
                        '<div class="flip-hint">👆 Chạm để lật xem luyện viết</div>' +
                    '</div>' +
                    '<div class="hanzi-back">' +
                        '<div class="back-title">✍️ Luyện viết: <span style="font-family:var(--font-cn);color:var(--hanzi-color)">' + item.char + '</span></div>' +
                        '<div class="writer-wrap"><div id="writer-' + item.char + '"></div></div>' +
                        '<div class="writer-mini-controls">' +
                            '<button class="writer-btn" onclick="demoChar(\'' + item.char + '\')">🎬 Mẫu</button>' +
                            '<button class="writer-btn" onclick="practiceChar(\'' + item.char + '\')">🖊️ Luyện</button>' +
                        '</div>' +
                        '<div class="writer-feedback" id="feedback-' + item.char + '"></div>' +
                        '<div class="back-flip-hint" onclick="flipCard(\'' + item.char + '\')">👆 Chạm lật lại</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function renderVocabCards() {
        var container = document.getElementById('vocab-container');
        container.innerHTML = vocabData.map(function(item, i) {
            return '<div class="flashcard" onclick="flipVocab(' + i + ')" id="fcard-' + i + '">' +
                '<div class="flashcard-inner">' +
                    '<div class="flashcard-front">' +
                        '<div class="word-cn">' + item.word + '</div>' +
                        '<div class="hint">👆 Chạm để lật thẻ</div>' +
                    '</div>' +
                    '<div class="flashcard-back">' +
                        '<div class="py">' + item.pinyin + '</div>' +
                        '<div class="mn">' + item.meaning + '</div>' +
                        '<div class="example-box">' +
                            '<div class="ex-cn">' + item.ex_cn + '</div>' +
                            '<div class="ex-py">' + item.ex_py + '</div>' +
                            '<div class="ex-vn">' + item.ex_vn + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function flipCard(char) {
        playSound('click');
        var card = document.getElementById('card-' + char);
        var wasFlipped = card.classList.contains('flipped');
        card.classList.toggle('flipped');
        if (!wasFlipped && !writerInstances[char]) { setTimeout(function() { initWriterFor(char); }, 320); }
    }

    function initWriterFor(char) {
        var el = document.getElementById('writer-' + char);
        if (!el || writerInstances[char]) return;
        var sz = window.innerWidth < 520 ? 175 : 205;
        try {
            var w = HanziWriter.create(el, char, {
                width: sz, height: sz, padding: 5, strokeColor: '#D81B60', radicalColor: '#FF6B8B',
                showOutline: true, strokeAnimationSpeed: 1
            });
            writerInstances[char] = w;
            setTimeout(function() { w.animateCharacter(); }, 400);
        } catch(e) { el.innerHTML = '<p style="color:#aaa;padding:10px;">Không tải được chữ</p>'; }
    }

    function demoChar(char) { playSound('click'); var w = writerInstances[char]; if (w) w.animateCharacter(); }
    function practiceChar(char) {
        playSound('click'); var w = writerInstances[char]; if (!w) return;
        w.cancelQuiz(); w.showOutline();
        var fb = document.getElementById('feedback-' + char);
        if (fb) { fb.innerHTML = '✏️ Viết...'; fb.style.color = '#888'; }
        w.quiz({
            onMistake: function() {},
            onCorrectStroke: function() { playSound('click'); },
            onComplete: function() { playSound('correct'); if (fb) { fb.innerHTML = '✅ Xong!'; fb.style.color = '#2e7d32'; } }
        });
    }

    function flipVocab(idx) { playSound('click'); document.getElementById('fcard-' + idx).classList.toggle('flipped'); }

    // ========== TABS ==========
    function switchTab(tabId) {
        playSound('click');
        document.querySelectorAll('.section').forEach(function(s) { s.classList.remove('active'); });
        document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'game' && currentQuestionIndex === 0 && score === 0 && userAnswers.length === 0) startGame();
    }

    // ========== GAME ==========
    var currentQuestionIndex = 0, score = 0, isAnswering = false, startTime, userAnswers = [];

    function startGame() {
        currentQuestionIndex = 0; score = 0; isAnswering = false; userAnswers = []; startTime = new Date();
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        isAnswering = false; var q = quizQuestions[currentQuestionIndex];
        document.getElementById('score-display').innerText = 'Điểm: ' + score;
        document.getElementById('question-count').innerText = 'Câu: ' + (currentQuestionIndex + 1) + '/' + quizQuestions.length;
        document.getElementById('progress').style.width = ((currentQuestionIndex / quizQuestions.length) * 100) + '%';
        document.getElementById('question-text').innerHTML = q.q;
        var opts = document.getElementById('options-container'); opts.innerHTML = '';
        q.options.forEach(function(opt, i) {
            var btn = document.createElement('button');
            btn.className = 'option-btn'; btn.innerHTML = opt;
            btn.onclick = function() { checkAnswer(i, btn); }; opts.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        if (isAnswering) return; isAnswering = true;
        var q = quizQuestions[currentQuestionIndex];
        var btns = document.querySelectorAll('.option-btn');
        var correct = selected === q.answer;
        userAnswers.push({ correct: correct, q: q.q, answer: q.answer });
        if (correct) { btn.classList.add('correct'); score += 10; playSound('correct'); }
        else { btn.classList.add('wrong'); btns[q.answer].classList.add('correct'); playSound('wrong'); }
        document.getElementById('score-display').innerText = 'Điểm: ' + score;
        setTimeout(function() {
            var modal = document.getElementById('explanation-modal');
            document.getElementById('modal-desc').innerText = q.exp;
            var icon = document.getElementById('modal-icon');
            var title = document.getElementById('modal-title');
            if (correct) { icon.innerText = '✅'; title.innerText = 'Tuyệt vời!'; title.className = 'modal-title t-correct'; }
            else { icon.innerText = '❌'; title.innerText = 'Rất tiếc!'; title.className = 'modal-title t-wrong'; }
            modal.style.display = 'flex';
        }, 500);
    }

    function nextQuestion() {
        playSound('click'); document.getElementById('explanation-modal').style.display = 'none';
        currentQuestionIndex++;
        if (currentQuestionIndex < quizQuestions.length) loadQuestion(); else showResult();
    }

    function showResult() {
        playSound('win');
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'flex';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('final-score').innerText = score;
        var title = document.getElementById('result-title');
        var btnNext = document.getElementById('btn-next');
        var maxScore = quizQuestions.length * 10, passingScore = maxScore * 0.6;
        
        if (score === maxScore) { title.innerText = 'Hoàn hảo!'; title.style.color = '#2e7d32'; btnNext.style.display = 'block'; }
        else if (score >= passingScore) { title.innerText = 'Rất Tốt!'; title.style.color = '#f57c00'; btnNext.style.display = 'block'; }
        else { title.innerText = 'Cố lên nhé!'; title.style.color = '#d84315'; btnNext.style.display = 'none'; }

        var elapsed = Math.floor((new Date() - startTime) / 1000);
        var mins = Math.floor(elapsed / 60), secs = elapsed % 60;
        var timeStr = mins > 0 ? mins + ' phút ' + secs + ' giây' : secs + ' giây';
        
        // Đã cập nhật biến user sang snap_user
        var currentUser = localStorage.getItem('snap_user') || 'Học viên ẩn danh'; 
        
        var total = quizQuestions.length;
        var wrongAnswers = userAnswers.map(function(a, i) { return { correct: a.correct, q: a.q, answer: a.answer, index: i }; }).filter(function(a) { return !a.correct; });
        var correctCount = total - wrongAnswers.length;
        var ratio = Math.round((correctCount / total) * 100);
        
        var breakdown = wrongAnswers.length > 0 ? 
            '<div style="font-weight:800;color:#d32f2f;margin-bottom:10px;font-size:1.05rem;">🔴 Các câu cần ôn lại:</div>' + 
            wrongAnswers.map(function(a) {
                return '<div class="q-item wrong"><div class="q-text">Câu ' + (a.index + 1) + ': ' + a.q + '</div><div style="font-size:0.9rem;color:#c62828;font-weight:bold;margin-top:5px;">👉 Đáp án đúng: ' + quizQuestions[a.index].options[a.answer] + '</div></div>';
            }).join('')
            : '<div style="text-align:center;padding:20px 10px;background:#e8f5e9;border-radius:12px;border:2px solid #c8e6c9;"><div style="font-size:1.2rem;color:#2e7d32;font-weight:800;">🎉 Quá Đỉnh!</div><div style="color:#388e3c;font-weight:600;">Bạn không sai một câu nào cả!</div></div>';

        document.getElementById('result-details').innerHTML =
            '<div class="stat-row"><span>👤 Người chơi:</span> <strong>' + currentUser + '</strong></div>' +
            '<div class="stat-row"><span>⏱ Thời gian:</span> <strong>' + timeStr + '</strong></div>' +
            '<div class="stat-row"><span>🎯 Tỉ lệ đúng:</span> <strong>' + correctCount + '/' + total + ' (' + ratio + '%)</strong></div>' +
            '<div class="q-breakdown">' + breakdown + '</div>';
    }

    // ========== CHỤP ẢNH ==========
    function takeScreenshot() {
        var resultArea = document.getElementById('result-area');
        var btn = document.querySelector('.btn-screenshot');
        var origText = btn.innerHTML;
        var detailsDiv = document.getElementById('result-details');
        var actionBtns = document.querySelector('.action-buttons');
        actionBtns.style.display = 'none';
        var origMax = detailsDiv.style.maxHeight;
        detailsDiv.style.maxHeight = 'none'; detailsDiv.style.overflow = 'visible';
        
        var wm = document.createElement('div');
        wm.innerHTML = "<b>Thành tích: HSK 1 - Bài 1</b><br><span style='font-size:0.85rem'>SnapChinese</span>";
        wm.style.cssText = "margin-top:20px;color:var(--primary-dark);text-align:center;width:100%";
        resultArea.appendChild(wm);
        
        html2canvas(resultArea, { backgroundColor: "#ffffff", scale: 2 }).then(function(canvas) {
            actionBtns.style.display = 'flex';
            detailsDiv.style.maxHeight = origMax; detailsDiv.style.overflow = 'auto';
            resultArea.removeChild(wm);
            btn.innerHTML = "⏳ Đang xử lý...";
            canvas.toBlob(function(blob) {
                if (blob) {
                    try {
                        navigator.clipboard.write([new ClipboardItem({"image/png": blob})]).then(function() {
                            btn.innerHTML = "✅ Đã copy ảnh! (Mở Zalo dán ngay)";
                            btn.style.background = "linear-gradient(135deg, #4CAF50, #388E3C)";
                            setTimeout(function() { btn.innerHTML = origText; btn.style.background = ""; }, 4000);
                        }).catch(function() { fallbackDownload(canvas, btn, origText); });
                    } catch(e) { fallbackDownload(canvas, btn, origText); }
                }
            });
        });
    }

    function fallbackDownload(canvas, btn, origText) {
        showToast("Điện thoại không hỗ trợ copy ảnh. Đã tải ảnh về máy.", "warning");
        var link = document.createElement('a');
        link.download = 'ThanhTich-HSK1-Bai1.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
        btn.innerHTML = origText;
    }

    // ========== NAVIGATION ==========
    function goBackToMenu() {
        window.location.href = 'hsk-index.html';
    }

    // ========== KHỞI ĐỘNG ==========
    window.onload = loadData;
</script>
