    // 2. BỘ PHÂN TÍCH TỰ ĐỘNG (Auto-Parser)
    function parseSRT(text) {
      // Tự động dọn dẹp các tag rác
      const cleanText = text.replace(/\\s*/g, '').trim();
      const lines = cleanText.split('\n').map(l => l.trim()).filter(l => l !== '');
      
      const result = [];
      let currentItem = null;
      const timeRegex = /(\d{2}):(\d{2}):(\d{2}),(\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2}),(\d{3})/;

      function toSec(h, m, s, ms) {
        return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(s) + parseInt(ms) / 1000;
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const t = line.match(timeRegex);

        if (t) {
          if (currentItem && currentItem.en) result.push(currentItem);
          currentItem = {
            start: toSec(t[1], t[2], t[3], t[4]),
            end: toSec(t[5], t[6], t[7], t[8]),
            en: "",
            vi: ""
          };
        } else if (currentItem) {
          // Bỏ qua các số thứ tự phân đoạn của SRT
          if (/^\d+$/.test(line) && i + 1 < lines.length && lines[i+1].match(timeRegex)) continue;
          
          if (!currentItem.en) {
            currentItem.en = line;
          } else if (!currentItem.vi) {
            currentItem.vi = line;
          } else {
            currentItem.vi += " " + line;
          }
        }
      }
      if (currentItem && currentItem.en) result.push(currentItem);
      return result;
    }

    const transcriptData = parseSRT(rawSrt);

    // 3. UI Tương tác
    let showTranslation = true;
    function toggleTranslation() {
      showTranslation = !showTranslation;
      document.documentElement.style.setProperty('--vi-display', showTranslation ? 'block' : 'none');
    }

    const scriptContainer = document.getElementById('script-container');
    
    // Đẩy dữ liệu ra màn hình
    transcriptData.forEach((line, index) => {
      const div = document.createElement('div');
      div.className = 'script-line';
      div.id = 'line-' + index;
      
      const enDiv = document.createElement('div');
      enDiv.className = 'en-text';
      enDiv.innerText = line.en;

      const viDiv = document.createElement('div');
      viDiv.className = 'vi-text';
      viDiv.innerText = line.vi || " "; // Xử lý câu không có tiếng Việt

      div.appendChild(enDiv);
      div.appendChild(viDiv);

     div.onclick = () => {
        if(player && player.seekTo && line.start !== null) {
          autoPauseTriggered = false; // Reset trạng thái tự động dừng
          player.seekTo(line.start, true);
          player.playVideo();
        }
      };

      scriptContainer.appendChild(div);
    });

    // 4. API YouTube & Xử lý nháy sáng câu
    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('ytplayer', {
        height: '100%',
        width: '100%',
        videoId: 'Wlehc1l50bk', 
        playerVars: { 'autoplay': 0, 'controls': 1 },
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }
let checkInterval;
    let currentLineIndex = -1;
    let autoPauseTriggered = false; // Thêm biến theo dõi trạng thái tự động

    function onPlayerStateChange(event) {
      if (event.data == YT.PlayerState.PLAYING) {
        // TĂNG TỐC ĐỘ QUÉT lên 50ms để bắt thời gian chuẩn xác nhất (thay vì 200ms)
        checkInterval = setInterval(updateHighlight, 50); 
      } else {
        clearInterval(checkInterval);
      }
    }

    function updateHighlight() {
      if(!player || !player.getCurrentTime) return;
      const time = player.getCurrentTime();
      let foundLine = -1;

      // 1. Tìm câu đang khớp với thời gian video
      for (let i = 0; i < transcriptData.length; i++) {
        if (time >= transcriptData[i].start && time <= transcriptData[i].end) {
          foundLine = i;
          break;
        }
      }

      // 2. LOGIC TỰ ĐỘNG DỪNG VÀ KHÓA CÂU (Sửa lỗi chấm 0%)
      if (currentLineIndex !== -1 && !autoPauseTriggered) {
        // Bắt thời điểm sát nút kết thúc câu (trừ hao 0.1 giây để không bị lẹm sang câu sau)
        if (time >= transcriptData[currentLineIndex].end - 0.1) {
          autoPauseTriggered = true; // Đánh dấu đã kích hoạt auto-pause
          player.pauseVideo();       // Dừng video ngay lập tức
          
          // CRITICAL FIX: Ép hệ thống giữ nguyên câu hiện tại (không cho nhảy sang câu tiếp theo lúc dừng)
          foundLine = currentLineIndex; 

          // Bật mic thu âm sau 300ms để tránh tạp âm từ video
          setTimeout(() => {
            if (!isRecording) {
              recordBtn.click();
            }
          }, 300);
        }
      }

      // 3. LOGIC ĐỔI MÀU VÀ CHUYỂN CÂU MỚI
      if (foundLine !== -1 && currentLineIndex !== foundLine) {
        autoPauseTriggered = false; // Reset lại biến khi video nhảy sang một câu mới hoàn toàn

        if (currentLineIndex !== -1) {
          document.getElementById('line-' + currentLineIndex).classList.remove('active');
        }
        const activeLine = document.getElementById('line-' + foundLine);
        activeLine.classList.add('active');
       
        // Căn lề mượt mà
        if (window.innerWidth <= 992) {
          activeLine.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        currentLineIndex = foundLine; // Cập nhật câu hiện tại
      }
    }

    // 5. Chức năng nhận diện giọng nói (Shadowing Evaluation)
    const recordBtn = document.getElementById('recordBtn');
    const resultText = document.getElementById('resultText');
    const scorePron = document.getElementById('score-pron');
    const scoreAcc = document.getElementById('score-acc');
    const scoreFlu = document.getElementById('score-flu');
    const scoreComp = document.getElementById('score-comp');

    let recognition;
    let isRecording = false;
    let recordStartTime = 0;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        const spoken = event.results[0][0].transcript;
        const confidence = event.results[0][0].confidence; // Điểm tự tin của API (0.0 đến 1.0)
        const durationSeconds = (Date.now() - recordStartTime) / 1000;
        
        resultText.innerText = `"${spoken}"`;
        calculateAdvancedScores(spoken, confidence, durationSeconds);
      };

      recognition.onerror = function(event) {
        resultText.innerText = "Error recognizing speech. Try again.";
        resetRecordButton();
      };

      recognition.onend = function() {
        if (isRecording) resetRecordButton();
      };

      recordBtn.onclick = () => {
        if (!isRecording) {
          if(player && player.pauseVideo) player.pauseVideo();
          recordStartTime = Date.now();
          recognition.start();
          isRecording = true;
          recordBtn.innerText = "Stop & Evaluate";
          recordBtn.classList.add('recording');
          resultText.innerText = "Listening...";
          
          // Reset điểm số
          ['pron', 'acc', 'flu', 'comp'].forEach(id => {
            document.getElementById(`score-${id}`).innerText = '--%';
            document.getElementById(`score-${id}`).style.color = "#444";
          });

        } else {
          recognition.stop();
          resetRecordButton();
        }
      };
    } else {
      resultText.innerText = "Speech API not supported. Please use Chrome/Edge.";
    }

    function resetRecordButton() {
      isRecording = false;
      recordBtn.innerText = "Click to Speak";
      recordBtn.classList.remove('recording');
    }

    function getColorForScore(score) {
      if (score >= 85) return "#4CAF50"; // Xanh lá
      if (score >= 60) return "#FF9800"; // Cam
      return "#ff6a88"; // Đỏ hồng
    }

    function calculateAdvancedScores(spoken, apiConfidence, durationSec) {
      if (currentLineIndex === -1) {
        resultText.innerText = "Please select a sentence first!";
        return;
      }
      
      const targetText = transcriptData[currentLineIndex].en.toLowerCase().replace(/[^\w\s]/gi, '');
      const spokenText = spoken.toLowerCase().replace(/[^\w\s]/gi, '');
      
      const targetWords = targetText.split(' ').filter(w => w);
      const spokenWords = spokenText.split(' ').filter(w => w);
      
      if (targetWords.length === 0) return;

      // 1. Completeness: Mức độ hoàn thiện (số từ đọc được / tổng số từ cần đọc)
      let matchedTargetWords = 0;
      targetWords.forEach(word => {
        if (spokenWords.includes(word)) matchedTargetWords++;
      });
      let completeness = Math.round((matchedTargetWords / targetWords.length) * 100);
      
      // 2. Accuracy: Độ chính xác (số từ đúng / tổng số từ đã phát âm)
      let accuracy = 0;
      if (spokenWords.length > 0) {
        accuracy = Math.round((matchedTargetWords / spokenWords.length) * 100);
      }
      // Giới hạn Accuracy không vượt quá 100 và không nhỏ hơn Completeness nếu đọc ít từ hơn
      if (accuracy > 100) accuracy = 100;

      // 3. Pronunciation: Sử dụng độ tin cậy của AI khi nhận diện giọng nói
      let pronunciation = Math.round(apiConfidence * 100);
      // Nếu đọc sai quá nhiều từ, phạt điểm Pronunciation
      if (accuracy < 50) pronunciation -= 20; 
      pronunciation = Math.max(0, Math.min(100, pronunciation));

      // 4. Fluency: Tính bằng tốc độ đọc (Words Per Minute) kết hợp với Completeness
      const expectedWPM = 130; 
      const spokenWPM = (spokenWords.length / durationSec) * 60;
      let fluency = 100;
      if (spokenWPM < 80) fluency -= (80 - spokenWPM); // Đọc chậm quá bị trừ
      if (spokenWPM > 200) fluency -= (spokenWPM - 200); // Đọc nhanh quá bị trừ
      // Trừ thêm nếu ấp úng (thời gian dài nhưng ra ít chữ hoàn chỉnh)
      fluency = Math.round((fluency * 0.6) + (completeness * 0.4));
      fluency = Math.max(0, Math.min(100, fluency));

      // Hiển thị điểm số và đổ màu
      const metrics = [
        { el: scorePron, val: pronunciation },
        { el: scoreAcc, val: accuracy },
        { el: scoreFlu, val: fluency },
        { el: scoreComp, val: completeness }
      ];

      metrics.forEach(m => {
        m.el.innerText = `${m.val}%`;
        m.el.style.color = getColorForScore(m.val);
      });
    }
  </script>
