<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 2 Test 1 (2023) | SnapEnglish</title>
  <link rel="icon" type="image/png" href="ảnh.png"> 
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Emerald (Xanh ngọc) & Amber (Vàng hổ phách) */
        :root {
            --primary: #059669;         /* Emerald 600 */
            --primary-hover: #047857;   /* Emerald 700 */
            --secondary: #D1FAE5;       /* Emerald 100 */
            --accent: #F59E0B;          /* Amber 500 */
            --theme-pastel: #ECFDF5;    /* Emerald 50 */
            --theme-dark: #064E3B;      /* Emerald 900 */
            --text-dark: #1E293B;       /* Slate 800 */
            --text-light: #64748B;      /* Slate 500 */
            --bg-main: #F8FAFC;         /* Slate 50 */
            --white: #FFFFFF;
            --brand-main: #D97706;      /* Amber 600 */
            --brand-text: #0F172A;      /* Slate 900 */
            --error-glow: #DC2626;      /* Red 600 báo lỗi */
            
            --badge-q-bg: #ECFDF5; --badge-q-border: #6EE7B7; --badge-q-text: #059669;
            --badge-opt-bg: #FFFBEB; --badge-opt-border: #FDE68A; --badge-opt-text: #D97706;
            --badge-corr-bg: #EFF6FF; --badge-corr-border: #BFDBFE; --badge-corr-text: #2563EB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-main);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #D1FAE5;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #E2E8F0 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--theme-pastel); padding: 20px; border-radius: 15px; color: var(--theme-dark); border: 1px solid #A7F3D0;}
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #CBD5E1; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #CBD5E1; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(5, 150, 105, 0.08); display: flex; flex-direction: column; position: relative;
            border: 1px solid #D1FAE5;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px dashed #E2E8F0; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #CBD5E1; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .badge-question { background: var(--badge-q-bg); color: var(--badge-q-text); border: 1px solid var(--badge-q-border); }
        .badge-option { background: var(--badge-opt-bg); color: var(--badge-opt-text); border: 1px solid var(--badge-opt-border); }
        .badge-correct { background: var(--badge-corr-bg); color: var(--badge-corr-text); border: 1px solid var(--badge-corr-border); }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(220, 38, 38, 0.3);
            font-weight: 800;
            background: #FEF2F2;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #E2E8F0; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(5, 150, 105, 0.15); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--theme-dark); color: var(--white); }
        .btn-enter:hover { background: #022C22; }
        .btn-hint { background: var(--secondary); color: var(--primary-hover); border: 1px solid #A7F3D0;}
        .btn-hint:hover { background: #6EE7B7; }
        .btn-nav { background: #F1F5F9; color: #475569; border: 1px solid #E2E8F0;}
        .btn-nav:hover { background: #E2E8F0; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: var(--primary); font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--brand-main); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #E2E8F0;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold;}
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F8FAFC; padding: 25px; border-radius: 15px; height: 350px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 2 Test 1 (2023)</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="sentence-label" class="speaker-badge badge-question">Question</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe hội thoại và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <p id="grammar-container"><strong>📖 Giải thích:</strong> <span id="trans-grammar"></span></p>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // Dữ liệu trích xuất từ file "p2 2023 t1.docx" với cơ chế audio thật (chia time start/end)
    const lessonData = [
        // Question 7
        { en: "What type of food does that store sell?",  vi: "Cửa hàng đó bán loại thức ăn gì? ", grammar: "M-Cn: Cửa hàng đó bán loại thức ăn gì? ", label: "Question 7", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-7.mp3",  start: 2, end: 4.5 },
        { en: "What a delicious recipe.",  vi: "Công thức thật ngon lành. ", grammar: "Phương án bẫy. Phương án chứa từ “recipe” liên quan đến từ “food” trong câu hỏi nhưng nội dung cả câu không phù hợp ý hỏi. ", label: "(A)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-7.mp3", start: 6, end: 8 },
        { en: "They have all kinds of cheese.",  vi: "Họ có tất cả các loại phô mai. ", grammar: "Đáp án đúng. ", label: "(B) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-7.mp3", start: 9.5, end: 11.8 },
        { en: "With a new jacket.",  vi: "Với một chiếc áo khoác mới. ", grammar: "Người hỏi muốn biết về việc “Cửa hàng đó bán loại thức ăn gì” trong khi phương án trả lời cung cấp thông tin về “một chiếc áo khoác mới”. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-7.mp3", start: 12.8, end: 15 },

        // Question 8
        { en: "When should we leave for the airport?",  vi: "Khi nào chúng ta nên ra sân bay? ", grammar: "Khi nào chúng ta nên ra sân bay? ", label: "Question 8", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-8.mp3",  start: 2, end: 4.5 },
        { en: "This afternoon at two o'clock.",  vi: "Chiều nay lúc 2 giờ. ", grammar: "Đáp án đúng. ", label: "(A) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-8.mp3", start: 5.8, end: 7.7 },
        { en: "I prefer an aisle seat.",  vi: "Tôi thích ngồi ở lối đi hơn. ", grammar: "Thông tin về ý kiến, không phù hợp để trả lời cho câu hỏi về thời gian với “When”. ", label: "(B)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-8.mp3", start: 9.5, end: 11.3 },
        { en: "Mr. Choi traveled there last year.",  vi: "Ông Choi đã đi du lịch ở đó năm ngoái. ", grammar: "Phương án bẫy. Phương án chứa từ “traveled” liên quan đến từ “airport” trong câu hỏi nhưng nội dung cả câu không phù hợp ý hỏi. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-8.mp3", start: 13, end: 15.3 },

        // Question 9
        { en: "Where's the hiring event being held?",  vi: "Cuộc tuyển dụng được tổ chức ở đâu? ", grammar: "W-Br: Cuộc tuyển dụng được tổ chức ở đâu? ", label: "Question 9", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-9.mp3",  start: 2, end: 4.2 },
        { en: "She sent it to a colleague.",  vi: "Cô ấy đã gửi nó cho một đồng nghiệp. ", grammar: "Phương án phù hợp để trả lời câu hỏi về người với “who”, không phù hợp với câu hỏi về nơi chốn với “where”. ", label: "(A)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-9.mp3", start: 6, end: 7.8 },
        { en: "In the main conference room.",  vi: "Ở phòng hội nghị chính. ", grammar: "Đáp án đúng. ", label: "(B) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-9.mp3", start: 9.5, end: 11.4 },
        { en: "If they open on time.",  vi: "Nếu họ mở cửa đúng giờ. ", grammar: "Việc “họ mở cửa đúng giờ” không liên quan đến địa điểm “cuộc tuyển dụng được tổ chức”. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-9.mp3", start: 12.8, end: 15 },

        // Question 10
        { en: "Why is the budget being updated?",  vi: "Tại sao ngân sách đang được cập nhật? ", grammar: "M-Cn: Tại sao ngân sách đang được cập nhật? ", label: "Question 10", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-10.mp3",  start: 1.9, end: 4 },
        { en: "When we rented the building.",  vi: "Khi chúng ta thuê tòa nhà. ", grammar: "Phương án cung cấp thông tin về mốc thời gian phù hợp để trả lời cho câu hỏi về thời gian với “when”, không phù hợp để trả lời cho câu hỏi về nguyên nhân với “Why”. ", label: "(A)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-10.mp3", start: 5.5, end: 7 },
        { en: "With the new designs.",  vi: "Với những thiết kế mới. ", grammar: "Phương án không cung cấp được nguyên nhân để trả lời cho câu hỏi về nguyên nhân với “Why”. ", label: "(B)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-10.mp3", start: 9, end: 10.5 },
        { en: "Because new sales figures came in.",  vi: "Bởi vì số liệu bán hàng mới đã đến. ", grammar: "Đáp án đúng. ", label: "(C) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-10.mp3", start: 12.5, end: 14.5 },

        // Question 11
        { en: "Can you cover my shift at work tomorrow?",  vi: "Bạn có thể làm luôn ca của tôi vào ngày mai được không? ", grammar: "Bạn có thể làm luôn ca của tôi vào ngày mai được không? ", label: "Question 11", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-11.mp3",  start: 0, end: 2.5 },
        { en: "No. I'm taking the day off.",  vi: "Không, tôi sẽ tận dụng một ngày nghỉ phép. ", grammar: "Đáp án đúng. ", label: "(A) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-11.mp3", start: 2.5, end: 4.5 },
        { en: "Before he updated the Website.",  vi: "Trước khi anh ấy cập nhật trang Web. ", grammar: "Thông tin “trước khi anh ta cập nhật trang web” không thể trả lời cho câu hỏi “có thể làm thay ca làm việc của tôi”. ", label: "(B)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-11.mp3", start: 4.5, end: 6.5 },
        { en: "It's on the agenda for Tuesday.",  vi: "Nó nằm trong lịch trình cho thứ Ba. ", grammar: "Thông tin “nó đã được đưa vào kế hoạch cho ngày thứ Ba” không thể trả lời cho câu hỏi “có thể làm ca làm việc của tôi”. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-11.mp3", start: 6.5, end: 9.0 },

        // Question 12
        { en: "Who ordered these vegetables?",  vi: "Ai đã đặt những loại rau này? ", grammar: "W-Br: Ai đã đặt những loại rau này? ", label: "Question 12", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-12.mp3",  start: 0, end: 2.5 },
        { en: "All of it.",  vi: "Tất cả. ", grammar: "Phương án phù hợp để trả lời câu hỏi về số lượng, không phù hợp với câu hỏi về người với “who”. ", label: "(A)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-12.mp3", start: 2.5, end: 4.5 },
        { en: "I believe Lewis did.",  vi: "Tôi tin là Luis đã đặt. ", grammar: "Đáp án đúng. ", label: "(B) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-12.mp3", start: 4.5, end: 6.5 },
        { en: "It was excellent, thanks.",  vi: "Nó rất tuyệt vời, cám ơn. ", grammar: "Phương án phù hợp để trả lời câu hỏi về ý kiến, không phù hợp với câu hỏi về người với “who”. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-12.mp3", start: 6.5, end: 9.0 },

        // Question 13
        { en: "How often should I mailed the notices?",  vi: "Tôi nên gửi thông báo bao lâu một lần? ", grammar: "M-Au: Tôi nên gửi thông báo bao lâu một lần? ", label: "Question 13", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-13.mp3",  start: 0, end: 2.5 },
        { en: "Once a month.",  vi: "Một lần mỗi tháng. ", grammar: "Đáp án đúng. ", label: "(A) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-13.mp3", start: 2.5, end: 4.5 },
        { en: "After three o'clock.",  vi: "Sau ba giờ. ", grammar: "Phương án cung cấp thông tin về mốc thời gian, không phù hợp để trả lời cho câu hỏi về tần suất với “How often”. ", label: "(B)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-13.mp3", start: 4.5, end: 6.5 },
        { en: "About half of them.",  vi: "Khoảng một nửa trong số chúng. ", grammar: "Phương án cung cấp thông tin về số lượng, không phù hợp để trả lời cho câu hỏi về tần suất với “How often”. ", label: "(C)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-13.mp3", start: 6.5, end: 9.0 },

        // Question 14
        { en: "Which folder are the documents in?",  vi: "Tài liệu đang ở trong thư mục nào? ", grammar: "W-Am: Tài liệu đang ở trong thư mục nào? ", label: "Question 14", type: "question", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-14.mp3",  start: 0, end: 2.5 },
        { en: "We agreed on the deadline.",  vi: "Chúng ta đã đồng ý về hạn chót. ", grammar: "Thông tin “chúng ta đã đồng ý về hạn chót” không thể trả lời cho câu hỏi “tài liệu đang ở trong thư mục nào”. ", label: "(A)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-14.mp3", start: 2.5, end: 4.5 },
        { en: "Sure, I'll take a look.",  vi: "Chắc chắn rồi, tôi sẽ xem qua. ", grammar: "Thông tin “chắc chắn rồi, tôi sẽ xem qua” phù hợp để trả lời cho một đề nghị, không thể trả lời cho câu hỏi “tài liệu đang ở trong thư mục nào”. ", label: "(B)", type: "option", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-14.mp3", start: 4.5, end: 6.5 },
        { en: "Let me show you.",  vi: "Để tôi chỉ cho bạn. ", grammar: "Đáp án đúng. ", label: "(C) - Đáp án đúng", type: "correct", audio: "https://zenlishtoeic.vn/wp-content/uploads/2023/07/zenlish-test-01-part-2-14.mp3", start: 6.5, end: 9.0 }
    ];

    window.currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    
    // Sử dụng HTML5 Audio thay vì SpeechSynthesis
    const audioElement = new Audio();

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("sentence-label");

    window.onload = () => {
        let count = localStorage.getItem('part2_test1_2023_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part2_test1_2023_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            window.currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = window.currentIndex + 1;
        
        const data = lessonData[window.currentIndex];
        
        labelDisplay.innerText = data.label;
        if (data.type === "question") {
            labelDisplay.className = "speaker-badge badge-question";
        } else if (data.type === "correct") {
            labelDisplay.className = "speaker-badge badge-correct";
        } else {
            labelDisplay.className = "speaker-badge badge-option";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        audioElement.pause();
        const data = lessonData[window.currentIndex];
        
        audioElement.src = data.audio;
        audioElement.playbackRate = parseFloat(document.getElementById('speed-setting').value);
        audioElement.currentTime = data.start;
        audioElement.play();

        const durationMs = ((data.end - data.start) * 1000) / audioElement.playbackRate;

        clearTimeout(playTimeout);
        playTimeout = setTimeout(() => {
            audioElement.pause();
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                setTimeout(triggerAudioLoop, 500); 
            }
        }, durationMs);

        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    function normalizeText(text) { 
        let standardText = text.replace(/[’‘`´]/g, "'"); 
        return standardText.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); 
    }

    function expandContractions(text) {
        let lower = text.toLowerCase().replace(/[’‘`´]/g, "'");
        const dict = {
            "they're": "they are", "we're": "we are", "you're": "you are",
            "he's": "he is", "she's": "she is", "it's": "it is", "that's": "that is", "there's": "there is", "who's": "who is", "what's": "what is",
            "i'm": "i am",
            "they'd": "they would", "we'd": "we would", "you'd": "you would", "he'd": "he would", "she'd": "she would", "i'd": "i would",
            "they've": "they have", "we've": "we have", "you've": "you have", "i've": "i have",
            "they'll": "they will", "we'll": "we will", "you'll": "you will", "he'll": "he will", "she'll": "she will", "it'll": "it will", "i'll": "i will",
            "don't": "do not", "doesn't": "does not", "didn't": "did not",
            "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
            "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
            "can't": "can not", "cannot": "can not", "won't": "will not", "wouldn't": "would not",
            "shouldn't": "should not", "couldn't": "could not", "mustn't": "must not"
        };
        lower = lower.replace(/[.,?!–\-:"]/g, '');
        return lower.split(/\s+/).map(w => dict[w] || w).join(' ').trim();
    }

    function normalizeSpelling(text) {
        return text
            .replace(/ise\b/g, 'ize')
            .replace(/ised\b/g, 'ized')
            .replace(/ising\b/g, 'izing')
            .replace(/ises\b/g, 'izes')
            .replace(/isation/g, 'ization')
            .replace(/our\b/g, 'or')
            .replace(/ours\b/g, 'ors')
            .replace(/tre\b/g, 'ter')
            .replace(/tres\b/g, 'ters')
            .replace(/lling\b/g, 'ling')
            .replace(/lled\b/g, 'led');
    }

    function checkAnswer() {
        const rawUserInput = inputField.value;
        const rawTargetText = lessonData[window.currentIndex].en;
        
        const userInputExpanded = normalizeSpelling(expandContractions(rawUserInput).replace(/'/g, ''));
        const targetTextExpanded = normalizeSpelling(expandContractions(rawTargetText).replace(/'/g, ''));
        
        if (userInputExpanded === targetTextExpanded) {
            msgBox.innerText = "";
            showModal();
            return;
        }

        if (targetTextExpanded.startsWith(userInputExpanded) && userInputExpanded.length > 0) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            return; 
        }

        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(rawTargetText);
        
        const userWordsNorm = userInput.split(' ').filter(w => w !== "");
        const targetWordsNorm = targetText.split(' ');
        
        const rawWords = rawUserInput.trim().split(/\s+/);

        if (userWordsNorm.length === 0) {
            msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
            return;
        }

        let wrongIndex = -1;
        for (let i = 0; i < userWordsNorm.length; i++) {
            if (userWordsNorm[i] !== targetWordsNorm[i]) {
                wrongIndex = i;
                break;
            }
        }

        if (wrongIndex !== -1) {
            let startPos = 0;
            for (let k = 0; k < wrongIndex; k++) {
                startPos += rawWords[k].length + 1; 
            }
            
            const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
            startPos += leadingSpaces;
            let endPos = startPos + rawWords[wrongIndex].length;

            inputField.focus();
            inputField.setSelectionRange(startPos, endPos);

            let displayHTML = rawWords.map((w, idx) => {
                if (idx === wrongIndex) {
                    return `<span class="glow-error">${w}</span>`;
                }
                return w;
            }).join(' ');

            msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
            
        } else if (userWordsNorm.length < targetWordsNorm.length) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            inputField.focus();
            inputField.setSelectionRange(inputField.value.length, inputField.value.length);
        } else {
            msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
        }
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[window.currentIndex].en);
        
        const targetWordsRaw = lessonData[window.currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        audioElement.pause();
        clearTimeout(playTimeout);

        const data = lessonData[window.currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        const grammarContainer = document.getElementById("grammar-container");
        if(data.grammar) {
            grammarContainer.style.display = "block";
            document.getElementById("trans-grammar").innerText = data.grammar;
        } else {
            grammarContainer.style.display = "none";
        }
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (window.currentIndex > 0) {
            window.currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (window.currentIndex < lessonData.length - 1) {
            window.currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        
        localStorage.setItem('part2_test1_2023_progress', window.currentIndex); 
        
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        window.currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (window.currentIndex < lessonData.length) {
            localStorage.setItem('part2_test1_2023_progress', window.currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((window.currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #E2E8F0 0)`;
    }

    window.playEndScreenAudio = function(idx) {
        audioElement.pause();
        const data = lessonData[idx];
        audioElement.src = data.audio;
        audioElement.currentTime = data.start;
        audioElement.playbackRate = parseFloat(document.getElementById('speed-setting').value) || 1.0;
        audioElement.play();
        const durationMs = ((data.end - data.start) * 1000) / audioElement.playbackRate;
        setTimeout(() => { audioElement.pause(); }, durationMs);
    };

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part2_test1_2023_count')) || 0;
        count++;
        localStorage.setItem('part2_test1_2023_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part2_test1_2023_progress');

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach((d, idx) => {
            const isQuestion = d.type === 'question';
            const color = isQuestion ? 'var(--badge-q-text)' : (d.type === 'correct' ? 'var(--badge-corr-text)' : 'var(--badge-opt-text)');
            const padding = isQuestion ? '0' : '25px';
            
            const playBtnHtml = `<button onclick="playEndScreenAudio(${idx})" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left: 5px; transition: 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Nghe lại câu này">🔊</button>`;

            htmlContent += `<p style="margin-bottom:10px; padding-left: ${padding};">
                <strong style="color:${color}">${d.label}:</strong> <span style="font-weight: 500;">${d.en}</span> ${playBtnHtml}<br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
            
            if (d.type === 'option' || d.type === 'correct') {
                if (d.label.includes('(C)')) {
                    htmlContent += `<hr style="border:1px dashed #E2E8F0; margin: 15px 0;">`;
                }
            }
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part2_test1_2023_progress', 0);
        location.reload();
    }
</script>
</body>
</html>
