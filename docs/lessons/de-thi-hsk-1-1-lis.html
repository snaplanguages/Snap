<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Favicon bạn yêu cầu -->
    <link rel="icon" type="image/png" href="ảnh.png">
    <title>H10901 Listening Test</title>
    
    <!-- Google Fonts cho giao diện cute, thanh lịch -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #84b6f4;
            --secondary: #ffb7b2;
            --accent: #fdcae1;
            --background: #fdfdff;
            --text-main: #4a4a4a;
            --card-bg: #ffffff;
            --correct: #b0e57c;
            --wrong: #ff6961;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--background);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .audio-player {
            width: 100%;
            margin: 20px 0;
            outline: none;
            border-radius: 50px;
        }

        .part-title {
            background-color: var(--accent);
            color: #fff;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 800;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(253, 202, 225, 0.5);
        }

        .question-card {
            background: var(--card-bg);
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .question-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary);
        }

        .question-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .q-num {
            background-color: var(--secondary);
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: 800;
        }

        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .option-label {
            flex: 1;
            min-width: 100px;
            background-color: #f9f9f9;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 10px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .option-label:hover {
            background-color: #eef5ff;
            border-color: var(--primary);
        }

        input[type="radio"] {
            display: none;
        }

        input[type="radio"]:checked + .option-label {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 10px rgba(132, 182, 244, 0.4);
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
            font-family: inherit;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(132, 182, 244, 0.4);
        }

        /* Result Modal */
        #result-section {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 30px;
            background-color: #f0fdf4;
            border-radius: 15px;
            border: 2px dashed var(--correct);
        }

        .score-display {
            font-size: 3rem;
            color: var(--correct);
            font-weight: 800;
            margin: 15px 0;
        }

        .correct-ans { background-color: var(--correct) !important; color: #333 !important; border-color: var(--correct) !important;}
        .wrong-ans { background-color: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important;}
        
        @media (max-width: 600px) {
            .options { flex-direction: column; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Bài Thi Nghe HSK 1</h1>
        <p>H10901 - Trắc nghiệm tính điểm tự động</p>
        <audio class="audio-player" controls src="https://traffic.libsyn.com/secure/learnchinese/H10901.mp3"></audio>
    </div>

    <form id="quiz-form">
        <!-- PHẦN 1 -->
        <div style="text-align: center;"><div class="part-title">Phần 1: Đúng / Sai</div></div>
        
        <div class="question-card" id="card-q1">
            <div class="question-header"><div class="q-num">1</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_1.png" alt="Question 1">
            <div class="options">
                <input type="radio" name="q1" id="q1-true" value="true">
                <label class="option-label" for="q1-true">ĐÚNG (√)</label>
                <input type="radio" name="q1" id="q1-false" value="false">
                <label class="option-label" for="q1-false">SAI (X)</label>
            </div>
        </div>

        <div class="question-card" id="card-q2">
            <div class="question-header"><div class="q-num">2</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_2.png" alt="Question 2">
            <div class="options">
                <input type="radio" name="q2" id="q2-true" value="true">
                <label class="option-label" for="q2-true">ĐÚNG (√)</label>
                <input type="radio" name="q2" id="q2-false" value="false">
                <label class="option-label" for="q2-false">SAI (X)</label>
            </div>
        </div>

        <div class="question-card" id="card-q3">
            <div class="question-header"><div class="q-num">3</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_3.png" alt="Question 3">
            <div class="options">
                <input type="radio" name="q3" id="q3-true" value="true">
                <label class="option-label" for="q3-true">ĐÚNG (√)</label>
                <input type="radio" name="q3" id="q3-false" value="false">
                <label class="option-label" for="q3-false">SAI (X)</label>
            </div>
        </div>

        <div class="question-card" id="card-q4">
            <div class="question-header"><div class="q-num">4</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_4.png" alt="Question 4">
            <div class="options">
                <input type="radio" name="q4" id="q4-true" value="true">
                <label class="option-label" for="q4-true">ĐÚNG (√)</label>
                <input type="radio" name="q4" id="q4-false" value="false">
                <label class="option-label" for="q4-false">SAI (X)</label>
            </div>
        </div>

        <div class="question-card" id="card-q5">
            <div class="question-header"><div class="q-num">5</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_5.png" alt="Question 5">
            <div class="options">
                <input type="radio" name="q5" id="q5-true" value="true">
                <label class="option-label" for="q5-true">ĐÚNG (√)</label>
                <input type="radio" name="q5" id="q5-false" value="false">
                <label class="option-label" for="q5-false">SAI (X)</label>
            </div>
        </div>

        <!-- PHẦN 2 -->
        <div style="text-align: center;"><div class="part-title">Phần 2: Chọn Ảnh Phù Hợp</div></div>

        <div class="question-card" id="card-q6">
            <div class="question-header"><div class="q-num">6</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_6.png" alt="Question 6">
            <div class="options">
                <input type="radio" name="q6" id="q6-a" value="A"><label class="option-label" for="q6-a">A</label>
                <input type="radio" name="q6" id="q6-b" value="B"><label class="option-label" for="q6-b">B</label>
                <input type="radio" name="q6" id="q6-c" value="C"><label class="option-label" for="q6-c">C</label>
            </div>
        </div>

        <div class="question-card" id="card-q7">
            <div class="question-header"><div class="q-num">7</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_7-1.jpg" alt="Question 7">
            <div class="options">
                <input type="radio" name="q7" id="q7-a" value="A"><label class="option-label" for="q7-a">A</label>
                <input type="radio" name="q7" id="q7-b" value="B"><label class="option-label" for="q7-b">B</label>
                <input type="radio" name="q7" id="q7-c" value="C"><label class="option-label" for="q7-c">C</label>
            </div>
        </div>

        <div class="question-card" id="card-q8">
            <div class="question-header"><div class="q-num">8</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_8.jpg" alt="Question 8">
            <div class="options">
                <input type="radio" name="q8" id="q8-a" value="A"><label class="option-label" for="q8-a">A</label>
                <input type="radio" name="q8" id="q8-b" value="B"><label class="option-label" for="q8-b">B</label>
                <input type="radio" name="q8" id="q8-c" value="C"><label class="option-label" for="q8-c">C</label>
            </div>
        </div>

        <div class="question-card" id="card-q9">
            <div class="question-header"><div class="q-num">9</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_9.jpg" alt="Question 9">
            <div class="options">
                <input type="radio" name="q9" id="q9-a" value="A"><label class="option-label" for="q9-a">A</label>
                <input type="radio" name="q9" id="q9-b" value="B"><label class="option-label" for="q9-b">B</label>
                <input type="radio" name="q9" id="q9-c" value="C"><label class="option-label" for="q9-c">C</label>
            </div>
        </div>

        <div class="question-card" id="card-q10">
            <div class="question-header"><div class="q-num">10</div></div>
            <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_10.jpg" alt="Question 10">
            <div class="options">
                <input type="radio" name="q10" id="q10-a" value="A"><label class="option-label" for="q10-a">A</label>
                <input type="radio" name="q10" id="q10-b" value="B"><label class="option-label" for="q10-b">B</label>
                <input type="radio" name="q10" id="q10-c" value="C"><label class="option-label" for="q10-c">C</label>
            </div>
        </div>

        <!-- PHẦN 3 -->
        <div style="text-align: center;"><div class="part-title">Phần 3: Ghép Tranh</div></div>
        <img class="question-image" src="https://mandarinbean.com/wp-content/uploads/2020/12/H1_part3.jpg" alt="Reference for Part 3">
        
        <script>
            // Hàm render nhanh các câu hỏi Phần 3
            for(let i=11; i<=15; i++) {
                document.write(`
                <div class="question-card" id="card-q${i}">
                    <div class="question-header"><div class="q-num">${i}</div></div>
                    <div class="options">
                        ${['A','B','C','D','E','F'].map(opt => `
                            <input type="radio" name="q${i}" id="q${i}-${opt.toLowerCase()}" value="${opt}">
                            <label class="option-label" for="q${i}-${opt.toLowerCase()}">${opt}</label>
                        `).join('')}
                    </div>
                </div>`);
            }
        </script>

        <!-- PHẦN 4 -->
        <div style="text-align: center;"><div class="part-title">Phần 4: Chọn Đáp Án Đúng</div></div>

        <div class="question-card" id="card-q16">
            <div class="question-header"><div class="q-num">16</div></div>
            <div class="options">
                <input type="radio" name="q16" id="q16-a" value="A"><label class="option-label" for="q16-a">A. 他的</label>
                <input type="radio" name="q16" id="q16-b" value="B"><label class="option-label" for="q16-b">B. 我的</label>
                <input type="radio" name="q16" id="q16-c" value="C"><label class="option-label" for="q16-c">C. 同学的</label>
            </div>
        </div>

        <div class="question-card" id="card-q17">
            <div class="question-header"><div class="q-num">17</div></div>
            <div class="options">
                <input type="radio" name="q17" id="q17-a" value="A"><label class="option-label" for="q17-a">A. 星期三</label>
                <input type="radio" name="q17" id="q17-b" value="B"><label class="option-label" for="q17-b">B. 星期五</label>
                <input type="radio" name="q17" id="q17-c" value="C"><label class="option-label" for="q17-c">C. 星期六</label>
            </div>
        </div>

        <div class="question-card" id="card-q18">
            <div class="question-header"><div class="q-num">18</div></div>
            <div class="options">
                <input type="radio" name="q18" id="q18-a" value="A"><label class="option-label" for="q18-a">A. 5</label>
                <input type="radio" name="q18" id="q18-b" value="B"><label class="option-label" for="q18-b">B. 15</label>
                <input type="radio" name="q18" id="q18-c" value="C"><label class="option-label" for="q18-c">C. 50</label>
            </div>
        </div>

        <div class="question-card" id="card-q19">
            <div class="question-header"><div class="q-num">19</div></div>
            <div class="options">
                <input type="radio" name="q19" id="q19-a" value="A"><label class="option-label" for="q19-a">A. 茶</label>
                <input type="radio" name="q19" id="q19-b" value="B"><label class="option-label" for="q19-b">B. 苹果</label>
                <input type="radio" name="q19" id="q19-c" value="C"><label class="option-label" for="q19-c">C. 杯子</label>
            </div>
        </div>

        <div class="question-card" id="card-q20">
            <div class="question-header"><div class="q-num">20</div></div>
            <div class="options">
                <input type="radio" name="q20" id="q20-a" value="A"><label class="option-label" for="q20-a">A. 爱学习</label>
                <input type="radio" name="q20" id="q20-b" value="B"><label class="option-label" for="q20-b">B. 很漂亮</label>
                <input type="radio" name="q20" id="q20-c" value="C"><label class="option-label" for="q20-c">C. 想回家</label>
            </div>
        </div>

        <button type="button" class="submit-btn" onclick="calculateScore()">Nộp Bài & Xem Điểm</button>
    </form>

    <div id="result-section">
        <h2>Kết Quả Của Bạn</h2>
        <div class="score-display"><span id="final-score">0</span> / 100</div>
        <p id="feedback-msg">Cố lên nhé!</p>
    </div>
</div>

<script>
    /* 
     * ĐÂY LÀ ĐÁP ÁN ĐÚNG (Key) ĐỂ TÍNH ĐIỂM
     * Bạn có thể thay đổi đáp án thực tế của H10901 vào trong ngoặc kép bên dưới.
     */
    const answerKey = {
        q1: "false", q2: "true", q3: "true", q4: "false", q5: "true",
        q6: "A", q7: "B", q8: "C", q9: "A", q10: "B",
        q11: "A", q12: "E", q13: "D", q14: "F", q15: "B",
        q16: "A", q17: "B", q18: "B", q19: "C", q20: "A"
    };

    function calculateScore() {
        let score = 0;
        const totalQuestions = 20;
        const pointsPerQuestion = 5;

        // Reset styling trước khi chấm lại
        document.querySelectorAll('.option-label').forEach(lbl => {
            lbl.classList.remove('correct-ans', 'wrong-ans');
        });

        for (let i = 1; i <= totalQuestions; i++) {
            let qName = "q" + i;
            let selectedOption = document.querySelector(`input[name="${qName}"]:checked`);
            let correctValue = answerKey[qName];

            if (selectedOption) {
                let userValue = selectedOption.value;
                let label = document.querySelector(`label[for="${selectedOption.id}"]`);
                
                if (userValue === correctValue) {
                    score += pointsPerQuestion;
                    label.classList.add('correct-ans');
                } else {
                    label.classList.add('wrong-ans');
                    // Hiện đáp án đúng
                    let correctInput = document.querySelector(`input[name="${qName}"][value="${correctValue}"]`);
                    if(correctInput) {
                        document.querySelector(`label[for="${correctInput.id}"]`).classList.add('correct-ans');
                    }
                }
            } else {
                // Nếu chưa chọn, báo đáp án đúng
                let correctInput = document.querySelector(`input[name="${qName}"][value="${correctValue}"]`);
                if(correctInput) {
                    document.querySelector(`label[for="${correctInput.id}"]`).classList.add('correct-ans');
                }
            }
        }

        // Hiện kết quả
        const resultSection = document.getElementById("result-section");
        const scoreDisplay = document.getElementById("final-score");
        const feedbackMsg = document.getElementById("feedback-msg");

        scoreDisplay.textContent = score;
        resultSection.style.display = "block";
        
        if (score === 100) {
            feedbackMsg.textContent = "Tuyệt vời! Bạn đạt điểm tuyệt đối! 🌟";
        } else if (score >= 60) {
            feedbackMsg.textContent = "Chúc mừng bạn đã đậu! Cố gắng phát huy nhé! 👏";
        } else {
            feedbackMsg.textContent = "Chưa đạt yêu cầu mất rồi, tiếp tục ôn tập thêm nha! 💪";
        }

        // Cuộn xuống xem điểm
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
