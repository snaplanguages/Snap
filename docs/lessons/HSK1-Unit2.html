<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK 1 - Bài 2: 谢谢你 | SnapChinese</title> 
    <link rel="icon" type="image/png" href="ảnh.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B8B; 
            --primary-dark: #D81B60;
            --secondary: #ff8a00; 
            --bg-color: rgba(255, 240, 245, 0.85); 
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #555;
            --hanzi-color: #D81B60;
            --font-cn: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif; 
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 30px;
            -webkit-user-select: none; -ms-user-select: none; user-select: none;
        }

        /* Lớp nền mờ ảo phía sau làm nổi bật nội dung */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.88), rgba(230, 230, 250, 0.88));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: -1;
        }

        input, textarea { user-select: auto; }
        .hidden { display: none !important; }

        .branding {
            width: 100%; text-align: center; padding: 20px 0 10px 0;
            font-size: 0.8rem; font-weight: 800; color: var(--primary-dark);
            letter-spacing: 1px; text-transform: uppercase;
            opacity: 0.8;
        }

        .header {
            width: 100%; max-width: 800px; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; border-radius: 0 0 25px 25px;
            box-shadow: 0 8px 25px rgba(216, 27, 96, 0.25);
        }

        .btn-back {
            background: rgba(255,255,255,0.2); color: white; text-decoration: none;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255,255,255,0.4);
            transition: all 0.2s; cursor: pointer;
        }
        .btn-back:hover { background: rgba(255,255,255,0.35); transform: translateY(-1px); }

        .header h2 { font-size: 1.25rem; text-align: center; flex: 1; margin: 0 10px; font-weight: 800; }
        .header-spacer { width: 120px; }

        .tabs {
            display: flex; justify-content: space-between; gap: 5px;
            margin: 25px auto; background: rgba(255, 255, 255, 0.8); padding: 6px;
            border-radius: 30px; box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            backdrop-filter: blur(5px);
            width: 95%; max-width: 700px;
        }

        .tab-btn {
            flex: 1; border: none; background: transparent;
            padding: 10px 0; border-radius: 25px;
            font-size: 0.9rem; font-weight: 800; color: #666;
            cursor: pointer; transition: all 0.2s;
            text-align: center; white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary); color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 139, 0.4);
        }

        .section { display: none; width: 100%; max-width: 800px; padding: 0 15px; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== HÁN TỰ HAI MẶT ===== */
        .hanzi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .hanzi-flip-card { background: transparent; width: 100%; height: 460px; perspective: 1000px; }
        .hanzi-flip-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; border-radius: 20px;
        }
        .hanzi-flip-card.flipped .hanzi-flip-inner { transform: rotateY(180deg); }

        .hanzi-front, .hanzi-back {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: 20px; padding: 22px; background: var(--card-bg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow-y: auto;
        }

        .hanzi-front {
            border-top: 6px solid var(--primary);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }

        .hanzi-back {
            transform: rotateY(180deg);
            border-top: 6px solid var(--secondary);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 18px;
        }

        .char-display { font-family: var(--font-cn); font-size: 3.5rem; color: var(--hanzi-color); line-height: 1.2; font-weight: 400; }

        .pinyin {
            background: #ffe6ee; color: var(--primary-dark); padding: 4px 18px; border-radius: 15px;
            font-weight: 800; font-size: 1.15rem; display: inline-block; margin: 5px 0;
        }

        .meaning { font-size: 1.1rem; font-weight: bold; color: #444; margin-bottom: 5px; }

        .hanzi-details {
            background: #f5f5f5; border-radius: 10px; padding: 12px; margin-bottom: 8px;
            text-align: left; font-size: 0.9rem; color: #424242; border-left: 4px solid var(--primary);
            width: 100%;
        }
        .hanzi-details p { margin-bottom: 5px; }
        .hanzi-details b { color: var(--primary-dark); }

        .memo {
            font-size: 0.92rem; background: #fff8e1; padding: 12px; border-radius: 12px;
            color: #5d4037; text-align: left; border-left: 5px solid var(--secondary);
            line-height: 1.5; width: 100%; margin-top: 4px;
        }

        .flip-hint { font-size: 0.8rem; color: #aaa; margin-top: auto; font-style: italic; }

        /* Mặt sau */
        .back-title { font-weight: 800; font-size: 0.95rem; color: var(--primary-dark); }
        .writer-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        .writer-mini-controls { display: flex; justify-content: center; gap: 12px; margin-top: 5px; }
        .writer-btn {
            background: white; border: 1.5px solid var(--primary); color: var(--primary-dark);
            padding: 8px 18px; border-radius: 20px; font-weight: 700; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
        }
        .writer-btn:hover, .writer-btn:active { background: var(--primary); color: white; }
        .writer-feedback { font-size: 0.85rem; min-height: 18px; font-weight: 700; margin-top: 5px; }
        .back-flip-hint { font-size: 0.8rem; color: #aaa; cursor: pointer; margin-top: 5px; font-style: italic; }

        /* ===== TỪ VỰNG FLASHCARD CAO CẤP ===== */
        .vocab-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .flashcard { width: 100%; height: 280px; perspective: 1000px; cursor: pointer; }
        .flashcard-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d;
        }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .flashcard-front { background: #fff; border: 2.5px solid var(--primary); }
        .flashcard-front .word-cn { font-family: var(--font-cn); font-size: 4.5rem; color: var(--text-main); font-weight: 500; letter-spacing: 2px; }
        .flashcard-front .hint { position: absolute; bottom: 12px; font-size: 0.8rem; color: #b0b0b0; font-style: italic; }
        .flashcard-back { background: #fffdf2; transform: rotateY(180deg); border: 2.5px solid var(--secondary); }
        .flashcard-back .py { font-size: 1.4rem; font-weight: 800; color: #1976d2; margin-bottom: 6px; }
        .flashcard-back .mn { font-size: 1.25rem; font-weight: 800; color: #e65100; margin-bottom: 12px; }
        .example-box { background: white; padding: 12px; border-radius: 12px; width: 100%; text-align: left; border: 1px dashed #ffe0b2; }
        .ex-cn { font-family: var(--font-cn); font-size: 1.1rem; color: #222; margin-bottom: 3px; }
        .ex-py { font-size: 0.9rem; color: #666; margin-bottom: 3px; font-weight: 600; }
        .ex-vn { font-size: 0.9rem; color: var(--primary-dark); font-style: italic; font-weight: 600; }

        /* ===== GAME ===== */
        .game-container { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); text-align: center; }
        .game-header { display: flex; justify-content: space-between; margin-bottom: 18px; font-weight: 800; color: var(--primary-dark); font-size: 1.05rem; }
        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; color: #444; line-height: 1.5; }
        .question-highlight { font-family: var(--font-cn); font-size: 2.8rem; color: var(--hanzi-color); display: block; margin: 12px 0; font-weight: normal; }
        .options-grid { display: flex; flex-direction: column; gap: 14px; }
        .option-btn {
            background: #f8f9fa; border: 2px solid #e2e8f0; padding: 16px; border-radius: 16px;
            font-size: 1.15rem; font-weight: 700; color: #334155; cursor: pointer; transition: all 0.2s; font-family: var(--font-cn);
        }
        .option-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn:active { transform: scale(0.99); }
        .option-btn.correct { background: #4CAF50; color: white; border-color: #388E3C; }
        .option-btn.wrong { background: #F44336; color: white; border-color: #D32F2F; }

        /* Modal Giải thích */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 420px; padding: 25px;
            border-radius: 24px; text-align: center; animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); border: 3px solid var(--primary);
        }
        .modal-icon { font-size: 4rem; margin-bottom: 10px; line-height: 1; }
        .modal-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 12px; }
        .modal-title.t-correct { color: #4CAF50; }
        .modal-title.t-wrong { color: #F44336; }
        .modal-desc { font-size: 1.1rem; color: #444; margin-bottom: 22px; line-height: 1.5; font-weight: 600; }
        .btn-next {
            background: var(--primary); color: white; border: none; padding: 14px 30px;
            border-radius: 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 4px 12px rgba(255, 107, 139, 0.3);
        }
        @keyframes popIn { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* KẾT QUẢ VÀ NÚT BẤM */
        .game-result { display: none; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .score-circle { width: 90px; height: 90px; border-radius: 50%; border: 5px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 1.9rem; font-weight: 900; color: var(--primary-dark); margin: 5px 0; background: #fff; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.15);}
        
        .result-details {
            width: 100%; background: #f8f9fa; border-radius: 18px; padding: 18px; margin: 12px 0;
            text-align: left; font-size: 1rem; color: #424242; max-height: 300px; overflow-y: auto; border: 1px solid #e0e0e0;
        }
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 10px 0; font-weight: 700; }
        .stat-row:last-child { border-bottom: none; }
        
        .q-breakdown { margin-top: 18px; }
        .q-item { margin-bottom: 10px; padding: 14px; border-radius: 14px; background: white; border: 1px solid #eee; border-left: 6px solid; }
        .q-item.wrong { border-left-color: #F44336; }
        .q-text { font-weight: 700; margin-bottom: 5px; line-height: 1.4; color: var(--text-muted); }
        .q-text .question-highlight { font-size: 1.15rem; display: inline; color: var(--hanzi-color); font-weight: 800; margin: 0 2px;}

        .action-buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 15px; }
        .action-buttons .row { display: flex; gap: 12px; width: 100%; }
        
        .btn-play-again { flex: 1; background: #fff; color: var(--text-muted); border: 2px solid #ccc; padding: 14px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; transition: 0.2s;}
        .btn-play-again:active { background: #eee; transform: scale(0.98); }
        
        .btn-next-lesson { flex: 1; background: linear-gradient(135deg, #ff9800, #ff5722); color: white; border: none; padding: 14px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; display: none; box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3); transition: 0.2s;}
        .btn-next-lesson:active { transform: scale(0.98); }
        
        .action-buttons-bottom { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .btn-screenshot { width: 100%; background: linear-gradient(135deg, #00BCD4, #0288D1); color: white; border: none; padding: 15px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(2, 136, 209, 0.3); transition: 0.2s;}
        .btn-screenshot:active { transform: scale(0.98); }
        
        .btn-menu { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 15px 10px; border-radius: 16px; font-weight: 800; cursor: pointer; text-decoration: none; text-align: center; font-size: 1.05rem; transition: 0.2s; box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3); display: block;}
        .btn-menu:active { transform: scale(0.98); }

        /* --- TOAST & SNAP POPUP SYSTEM --- */
        .toast-box { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 10000; pointer-events: none; }
        .toast { background: white; color: var(--text-main); padding: 15px 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(216, 27, 96, 0.15); border-left: 6px solid var(--primary); font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 700; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #4CAF50; }
        .toast.error { border-left-color: #F44336; }
        .toast.warning { border-left-color: #ff8a00; }
        .toast-icon { font-size: 1.2rem; }

        .modal-overlay-snap { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 10001; justify-content: center; align-items: center; }
        .snap-popup-box { background: white; padding: 35px 25px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center; border: 3px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: popIn 0.3s; }
        .snap-popup-icon { font-size: 45px; margin-bottom: 15px; }
        .snap-popup-title { color: var(--primary-dark); font-weight: 900; font-size: 1.5rem; margin-top:0; margin-bottom: 12px; }
        .snap-popup-msg { margin-bottom: 25px; font-weight: 600; color: var(--text-muted); font-size: 1.05rem; line-height: 1.6; }
        .snap-btn-container { display: flex; gap: 15px; justify-content: center; }
        .snap-btn-confirm { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; width: 100%; }
        .snap-btn-confirm:hover { background: var(--primary-dark); transform: translateY(-2px); }
/* --- NÚT AUDIO CHO TỪ VỰNG --- */
.audio-icon-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(255, 107, 139, 0.1);
    color: var(--primary-dark);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 10;
}
.audio-icon-btn:hover {
    background: var(--primary);
    color: white;
    transform: scale(1.1);
}
.ex-audio-inline {
    display: inline-block;
    cursor: pointer;
    margin-left: 6px;
    font-size: 0.95rem;
    color: var(--primary-dark);
    transition: transform 0.1s;
}
.ex-audio-inline:active { transform: scale(1.2); }
        /* =========================================
           ĐÁP ỨNG TOÀN DIỆN MỌI THIẾT BỊ (RESPONSIVE)
           ========================================= */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 12px; text-align: center; border-radius: 0 0 20px 20px; padding: 15px;}
            .header h2 { margin: 5px 0; font-size: 1.2rem;}
            .header-spacer { display: none; }
            .btn-back { align-self: flex-start; }
            
            .tabs { width: 100%; flex-wrap: wrap; border-radius: 20px; }
            .tab-btn { padding: 10px 5px; font-size: 0.85rem; border-radius: 15px; }
            
            .hanzi-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            .vocab-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            
            .action-buttons-bottom { flex-direction: column; }
            .btn-screenshot, .btn-menu { width: 100%; }
        }

        @media (max-width: 480px) {
            .btn-back { width: 100%; justify-content: center; }
            .tab-btn { font-size: 0.8rem; }
            
            .hanzi-flip-card { height: 440px; }
            .char-display { font-size: 3.2rem; }
            
            .game-container { padding: 18px; }
            .question-text { font-size: 1.1rem; }
            .option-btn { font-size: 1.05rem; padding: 14px; }
            
            .flashcard { height: 290px; } 
            .flashcard-front .word-cn { font-size: 3.5rem; }
            .flashcard-back .py { font-size: 1.2rem; }
            .flashcard-back .mn { font-size: 1.1rem; }
            
            .score-circle { width: 75px; height: 75px; font-size: 1.6rem; }
        }
        
        @media (min-width: 520px) {
            .action-buttons-bottom { flex-direction: row; }
            .btn-screenshot, .btn-menu { flex: 1; }
        }
    </style>
</head>
<body>

<audio id="toastSound" src="https://assets.mixkit.co/active_storage/sfx/2870/2870-preview.mp3" preload="auto"></audio>
<div id="toastBox" class="toast-box"></div>

<div class="modal-overlay-snap" id="snapPopupOverlay">
    <div class="snap-popup-box">
        <div id="snapPopupIcon" class="snap-popup-icon">✨</div>
        <h3 id="snapPopupTitle" class="snap-popup-title">Tiêu đề</h3>
        <p id="snapPopupMessage" class="snap-popup-msg">Nội dung</p>
        <div class="snap-btn-container">
            <button id="snapPopupBtnConfirm" class="snap-btn-confirm">Đã hiểu</button>
        </div>
    </div>
</div>

<header class="header">
    <a href="#" onclick="goBackToMenu(); return false;" class="btn-back">🏠 Về Trang Chủ</a>
    <h2>Bài 2: 谢谢 bạn</h2>
    <div class="header-spacer"></div>
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('hanzi')">✏️ Hán Tự</button>
    <button class="tab-btn" onclick="switchTab('vocab')">🃏 Từ Vựng</button>
    <button class="tab-btn" onclick="switchTab('game')">🎮 Luyện Tập</button>
</div>

<section id="hanzi" class="section active">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:15px;font-size:0.9rem;font-weight:700;">* Chạm vào thẻ để lật xem mặt luyện viết</p>
    <div class="hanzi-grid" id="hanzi-container"></div>
</section>

<section id="vocab" class="section">
    <p style="text-align:center;color:var(--text-muted);margin-bottom:15px;font-size:0.9rem;font-weight:700;">* Chạm vào thẻ để lật xem mặt sau</p>
    <div class="vocab-grid" id="vocab-container"></div>
</section>

<section id="game" class="section">
    <div class="game-container" id="quiz-area">
        <div class="game-header">
            <span id="score-display">Điểm: 0</span>
            <span id="question-count">Câu: 1/15</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div id="question-text" class="question-text"></div>
        <div class="options-grid" id="options-container"></div>
    </div>
    
    <div class="game-container game-result" id="result-area">
        <div style="font-size:3.5rem; line-height: 1; margin-bottom: 5px;">🏆</div>
        <div class="score-circle" id="final-score">150</div>
        <h2 id="result-title" style="margin-bottom: 5px;">Tuyệt cú mèo!</h2>
        
        <div id="result-details" class="result-details"></div>
        
        <div class="action-buttons">

<script>
    // ===== TOAST & POPUP LOẠI BỎ ALERT =====
    function showToast(message, type = 'info') {
        const toastBox = document.getElementById('toastBox');
        const toast = document.createElement('div');
        toast.classList.add('toast', type);

        let icon = '🌸';
        if (type === 'success') icon = '✅';
        if (type === 'error') icon = '❌';
        if (type === 'warning') icon = '⚠️';

        toast.innerHTML = `<span class="toast-icon">${icon}</span> <span>${message}</span>`;
        toastBox.appendChild(toast);

        const sound = document.getElementById('toastSound');
        if (sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }

        setTimeout(() => { toast.classList.add('show'); }, 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => { toast.remove(); }, 400);
        }, 3000);
    }

    const SnapPopup = {
        show: function({ title, message, icon = '✨' }) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('snapPopupOverlay');
                document.getElementById('snapPopupTitle').innerText = title;
                document.getElementById('snapPopupMessage').innerText = message;
                document.getElementById('snapPopupIcon').innerText = icon;
                
                overlay.style.display = 'flex';
                
                document.getElementById('snapPopupBtnConfirm').onclick = () => {
                    overlay.style.display = 'none';
                    resolve(true);
                };
            });
        }
    };

    // ===== CHỐNG COPY VÀ INSPECT =====
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.key === 'F12' || 
            (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
            (e.ctrlKey && ['u','s','p','U','S','P'].includes(e.key))) {
            e.preventDefault();
        }
    });

    // ===== ÂM THANH =====
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    function playSound(type) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'click') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, now);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now); osc.stop(now + 0.4);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.linearRampToValueAtTime(150, now + 0.3);
            gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554.37, now + 0.15);
            osc.frequency.setValueAtTime(659.25, now + 0.3); osc.frequency.setValueAtTime(880, now + 0.45);
            gainNode.gain.setValueAtTime(0.05, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(now); osc.stop(now + 0.8);
        }
    }
    document.body.addEventListener('click', initAudio, { once: true });
// ========== PHÁT ÂM TIẾNG TRUNG (TTS) ==========
function speakChinese(text, isSlow = false) {
    if ('speechSynthesis' in window) {
        // Hủy lượt đọc cũ nếu có để tránh bị đè tiếng
        window.speechSynthesis.cancel();
        
        var utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN'; // Đọc giọng Trung Quốc chuẩn
        
        // Nếu là từ vựng thì cho đọc chậm một chút cho học viên dễ nghe (0.8), câu ví dụ thì đọc bình thường (1)
        utterance.rate = isSlow ? 0.75 : 0.9; 
        
        window.speechSynthesis.speak(utterance);
    } else {
        showToast("Trình duyệt của bạn không hỗ trợ phát âm tự động!", "error");
    }
}
    // ===== DỮ LIỆU BÀI 2 =====

    const vocabData = [

    const quizQuestions = [
        { q: 'Nghĩa của từ <span class="question-highlight">谢谢</span> là gì?', options: ['Tạm biệt', 'Cảm ơn', 'Không có gì', 'Xin lỗi'], answer: 1, exp: '谢谢 (xièxie) nghĩa là Cảm ơn.' },

        { q: 'Pinyin của từ <span class="question-highlight">不客气</span> là gì?', options: ['bù gèqì', 'bú kèqi', 'bù kèqi', 'bú gèqi'], answer: 2, exp: 'Phiên âm chuẩn là bù kèqi.' },
        { q: 'Cuối buổi học, bạn muốn chào tạm biệt thầy giáo. Bạn sẽ nói:', options: ['老师，再见！', '老师，谢谢！', '对不起，老师！', '老师，不客气！'], answer: 0, exp: '老师，再见！ (Lǎoshī, zàijiàn!)' },

        { q: 'Điền từ còn thiếu: <span class="question-highlight">不 _ 气</span>', options: ['客', '对', '起', '见'], answer: 0, exp: 'Cụm từ hoàn chỉnh là 不客气 (bù kèqi).' },
        { q: 'Chữ <span class="question-highlight">见</span> được tạo thành từ hình ảnh gì?', options: ['Cái cây', 'Mặt trời', 'Con mắt và đôi chân', 'Bàn tay'], answer: 2, exp: 'Con mắt (目) và đôi chân (儿) -> đi gặp.' },
        { q: 'Pinyin của chữ <span class="question-highlight">再</span> là gì?', options: ['zài', 'cài', 'zhài', 'sài'], answer: 0, exp: 'Chữ 再 đọc là zài (thanh 4).' },

        { q: '"Cảm ơn sự giúp đỡ của bạn" tiếng Trung là gì?', options: ['谢谢老师', '你们再见', '谢谢朋友的帮助', '你不客气'], answer: 2, exp: '谢谢朋友 của giúp đỡ.' },
        { q: 'Chữ tượng hình mô phỏng luồng hơi bốc lên là chữ nào?', options: ['客', '再', '见', '气'], answer: 3, exp: 'Chữ 气 (qì) chính là hình ảnh luồng hơi.' },
        { q: 'Logic giao tiếp: Họ nói "谢谢", bạn đáp gì?', options: ['不客气', '再见', '你好', '对不起'], answer: 0, exp: 'Đáp lại 谢谢 là 不客气.' },
        { q: 'Điền từ còn thiếu: <span class="question-highlight">再 _</span>', options: ['见', '气', '客', '谢'], answer: 0, exp: 'Cụm từ hoàn chỉnh là 再见 (zàijiàn).' }

    // ===== ĐIỀU HƯỚNG =====
    function goBackToMenu() {
        window.location.href = 'hsk-cu.html';

    // ===== RENDER HÁN TỰ (2 MẶT) =====
    const writerInstances = {};

    function renderHanziCards() {
        const container = document.getElementById('hanzi-container');
        let html = '';
        hanziData.forEach(item => {
            html += `
                <div class="hanzi-flip-card" id="card-${item.char}">
                    <div class="hanzi-flip-inner">
                        <div class="hanzi-front" onclick="flipCard('${item.char}')">
                            <div class="char-display">${item.char}</div>
                            <div class="pinyin">${item.pinyin}</div>
                            <div class="meaning">${item.meaning}</div>
                            <div class="hanzi-details">
                                <p><b>🏷️ Cấu tạo:</b> ${item.type}</p>
                                <p><b>🧩 Bộ thủ:</b> ${item.radical}</p>
                            </div>
                            <div class="memo">💡 <b>Mẹo nhớ:</b> ${item.memo}</div>
                            <div class="flip-hint">👆 Chạm để lật xem luyện viết</div>
                        </div>
                        <div class="hanzi-back">
                            <div class="back-title">✍️ Luyện viết: <span style="font-family:var(--font-cn);color:var(--hanzi-color)">${item.char}</span> — ${item.pinyin}</div>
                            <div class="writer-wrap"><div id="writer-${item.char}"></div></div>
                            <div class="writer-mini-controls">
                                <button class="writer-btn" onclick="demoChar('${item.char}')">🎬 Xem mẫu</button>
                                <button class="writer-btn" onclick="practiceChar('${item.char}')">🖊️ Luyện viết</button>
                            </div>
                            <div class="writer-feedback" id="feedback-${item.char}"></div>

                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function flipCard(char) {
        playSound('click');
        const card = document.getElementById(`card-${char}`);
        const wasFlipped = card.classList.contains('flipped');
        card.classList.toggle('flipped');
        if (!wasFlipped && !writerInstances[char]) {
            setTimeout(() => initWriterFor(char), 320);
        }
    }

    function initWriterFor(char) {
        const el = document.getElementById(`writer-${char}`);
        if (!el || writerInstances[char]) return;
        const sz = window.innerWidth < 520 ? 175 : 205;
        try {
            const w = HanziWriter.create(el, char, {
                width: sz, height: sz, padding: 5,
                strokeColor: '#D81B60', radicalColor: '#FF6B8B',
                showOutline: true, strokeAnimationSpeed: 1
            });
            writerInstances[char] = w;
            setTimeout(() => w.animateCharacter(), 400);
        } catch(e) {
            if (el) el.innerHTML = '<p style="color:#aaa;padding:10px;">Không tải được chữ</p>';
        }
    }

    document.addEventListener('click', function(e) {
        if (e.target.closest('.writer-mini-controls') || e.target.closest('.back-flip-hint')) {
            e.stopPropagation();
        }
    });

    // Proxy cho điều khiển nét vẽ
    window.demoChar = function(char) { event.stopPropagation(); playSound('click'); const w = writerInstances[char]; if (w) w.animateCharacter(); };
    window.practiceChar = function(char) {
        event.stopPropagation(); playSound('click'); const w = writerInstances[char]; if (!w) return;
        w.cancelQuiz(); w.showOutline();
        const fb = document.getElementById(`feedback-${char}`);
        if (fb) { fb.innerHTML = '✏️ Viết theo thứ tự nét...'; fb.style.color = '#888'; }
        w.quiz({
            onMistake: () => {},
            onCorrectStroke: () => playSound('click'),
            onComplete: () => { playSound('correct'); if (fb) { fb.innerHTML = '✅ Hoàn thành! Tuyệt vời!'; fb.style.color = '#2e7d32'; } }
        });
    };

   function renderVocabCards() {
    var container = document.getElementById('vocab-container');
    container.innerHTML = vocabData.map(function(item, i) {
        return '<div class="flashcard" onclick="flipVocab(' + i + ')" id="fcard-' + i + '">' +
            '<div class="flashcard-inner">' +
                // Mặt trước từ vựng (Có nút loa to ở góc)
                '<div class="flashcard-front">' +
                    '<button class="audio-icon-btn" onclick="event.stopPropagation(); speakChinese(\'' + item.word + '\', true)">🔊</button>' +
                    '<div class="word-cn">' + item.word + '</div>' +
                    '<div class="hint">👆 Chạm để lật thẻ</div>' +
                '</div>' +
                // Mặt sau từ vựng (Có nút loa đọc từ và loa nhỏ đọc câu ví dụ)
                '<div class="flashcard-back">' +
                    '<button class="audio-icon-btn" onclick="event.stopPropagation(); speakChinese(\'' + item.word + '\', true)">🔊</button>' +
                    '<div class="py">' + item.pinyin + '</div>' +
                    '<div class="mn">' + item.meaning + '</div>' +
                    '<div class="example-box">' +
                        '<div class="ex-cn">' + item.ex_cn + ' <span class="ex-audio-inline" onclick="event.stopPropagation(); speakChinese(\'' + item.ex_cn + '\', false)">🗣️</span></div>' +
                        '<div class="ex-py">' + item.ex_py + '</div>' +
                        '<div class="ex-vn">' + item.ex_vn + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}
    function flipVocab(idx) {
        playSound('click');
        document.getElementById(`fcard-${idx}`).classList.toggle('flipped');
    }

    // ===== TABS =====
    function switchTab(tabId) {
        playSound('click');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'game' && currentQuestionIndex === 0 && score === 0 && userAnswers.length === 0) startGame();
    }

    // ===== GAME LOGIC =====
    let currentQuestionIndex = 0, score = 0, isAnswering = false;
    let startTime;
    let userAnswers = [];

    function startGame() {
        currentQuestionIndex = 0; 
        score = 0; 
        isAnswering = false;
        userAnswers = [];
        startTime = new Date();
        // Tráo đổi xáo trộn ngẫu nhiên thứ tự câu hỏi trước khi bắt đầu
        quizQuestions.sort(() => Math.random() - 0.5);
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        isAnswering = false;
        const q = quizQuestions[currentQuestionIndex];
        document.getElementById('score-display').innerText = `Điểm: ${score}`;
        document.getElementById('question-count').innerText = `Câu: ${currentQuestionIndex + 1}/${quizQuestions.length}`;
        document.getElementById('progress').style.width = `${(currentQuestionIndex / quizQuestions.length) * 100}%`;
        document.getElementById('question-text').innerHTML = q.q;
        const opts = document.getElementById('options-container');
        opts.innerHTML = '';
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn'; btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(i, btn);
            opts.appendChild(btn);
        });
    }

    function checkAnswer(selected, btn) {
        if (isAnswering) return; isAnswering = true;
        const q = quizQuestions[currentQuestionIndex];
        const btns = document.querySelectorAll('.option-btn');
        const correct = selected === q.answer;
        
        userAnswers.push({ correct: correct, q: q.q, answer: q.answer });

        if (correct) { 
            btn.classList.add('correct'); score += 10; playSound('correct'); 
        } else { 
            btn.classList.add('wrong'); btns[q.answer].classList.add('correct'); playSound('wrong'); 
        }
        
        document.getElementById('score-display').innerText = `Điểm: ${score}`;
        
        setTimeout(() => {
            const modal = document.getElementById('explanation-modal');
            document.getElementById('modal-desc').innerText = q.exp;
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            if (correct) {
                icon.innerText = '✅'; title.innerText = 'Tuyệt vời!';
                title.className = 'modal-title t-correct';
            } else {
                icon.innerText = '❌'; title.innerText = 'Rất tiếc!';
                title.className = 'modal-title t-wrong';
            }
            modal.style.display = 'flex';
        }, 500);
    }

    function nextQuestion() {
        playSound('click');
        document.getElementById('explanation-modal').style.display = 'none';
        currentQuestionIndex++;
        if (currentQuestionIndex < quizQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        playSound('win');
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'flex';
        document.getElementById('progress').style.width = '100%';
        document.getElementById('final-score').innerText = score;
        
        var title = document.getElementById('result-title');
        var btnNext = document.getElementById('btn-next');
        
        const maxScore = quizQuestions.length * 10;
        const passingScore = maxScore * 0.6;

        if (score === maxScore) {
            title.innerText = `Hoàn hảo!`;
            title.style.color = '#2e7d32';
            btnNext.style.display = 'block';
        } else if (score >= passingScore) {
            title.innerText = 'Rất Tốt!';
            title.style.color = '#f57c00';
            btnNext.style.display = 'block';
        } else {
            title.innerText = 'Cố lên nhé!';
            title.style.color = '#d84315';
            btnNext.style.display = 'none';
        }

        const endTime = new Date();
        const elapsedSeconds = Math.floor((endTime - startTime) / 1000);
        const mins = Math.floor(elapsedSeconds / 60);
        const secs = elapsedSeconds % 60;
        const timeStr = mins > 0 ? `${mins} phút ${secs} giây` : `${secs} giây`;

        const currentUser = localStorage.getItem('snap_user') || 'Học viên ẩn danh';
        const totalCount = quizQuestions.length;
        
        // Thống kê chính xác theo thứ tự các câu sai đã xáo trộn thực tế
        let breakdownHTML = '';
        let hasWrong = false;
        
        userAnswers.forEach(function(ans, i) {
            if(!ans.correct) {
                hasWrong = true;
                breakdownHTML += `
                    <div class="q-item wrong">
                        <div class="q-text">Câu ${i + 1}: ${ans.q}</div>
                        <div style="font-size: 0.9rem; color: #c62828; font-weight: bold; margin-top: 5px;">
                            👉 Đáp án đúng: ${quizQuestions[i].options[ans.answer]} 
                        </div>
                    </div>
                `;
            }
        });

        const breakdown = hasWrong ? 
            `<div style="font-weight: 800; color: #d32f2f; margin-bottom: 10px; font-size: 1.05rem;">🔴 Các câu cần ôn lại:</div>` + breakdownHTML
            : `
                <div style="text-align:center; padding: 20px 10px; background: #e8f5e9; border-radius: 12px; border: 2px solid #c8e6c9;">
                    <div style="font-size: 1.2rem; color: #2e7d32; font-weight: 800;">🎉 Quá Đỉnh!</div>
                    <div style="color: #388e3c; font-weight: 600;">Bạn không sai một câu nào cả!</div>
                </div>`;

        const correctCount = totalCount - userAnswers.filter(a => !a.correct).length;
        const ratio = Math.round((correctCount / totalCount) * 100);

        const detailsHTML = `
            <div class="stat-row"><span>👤 Người chơi:</span> <strong>${currentUser}</strong></div>
            <div class="stat-row"><span>⏱ Thời gian:</span> <strong>${timeStr}</strong></div>
            <div class="stat-row"><span>🎯 Tỉ lệ đúng:</span> <strong>${correctCount}/${totalCount} (${ratio}%)</strong></div>
            <div class="q-breakdown">${breakdown}</div>
        `;
        document.getElementById('result-details').innerHTML = detailsHTML;
    }

    // ===== CHỤP ẢNH MÀN HÌNH TỐI ƯU KHÔNG SỬ DỤNG ALERT =====
    function takeScreenshot() {
        const resultArea = document.getElementById('result-area');
        const btnScreenshot = document.querySelector('.btn-screenshot');
        const originalText = btnScreenshot.innerHTML;
        const detailsDiv = document.getElementById('result-details');
        
        const actionBtns = document.querySelector('.action-buttons');
        actionBtns.style.display = 'none';
        
        const origMaxHeight = detailsDiv.style.maxHeight;
        detailsDiv.style.maxHeight = 'none';
        detailsDiv.style.overflow = 'visible';
        
        const watermark = document.createElement('div');
        watermark.innerHTML = "<b>Thành tích: HSK 1 - Bài 2</b><br><span style='font-size:0.85rem'>SnapChinese</span>";
        watermark.style.marginTop = "20px";
        watermark.style.color = "var(--primary-dark)";
        watermark.style.textAlign = "center";
        watermark.style.width = "100%";
        resultArea.appendChild(watermark);

        html2canvas(resultArea, { backgroundColor: "#ffffff", scale: 2, borderRadius: 20 }).then(canvas => {
            actionBtns.style.display = 'flex';
            detailsDiv.style.maxHeight = origMaxHeight;
            detailsDiv.style.overflow = 'auto';
            resultArea.removeChild(watermark);
            
            btnScreenshot.innerHTML = "⏳ Đang xử lý...";
            
            canvas.toBlob(blob => {
                if (blob) {
                    try {
                        const item = new ClipboardItem({ "image/png": blob });
                        navigator.clipboard.write([item]).then(function() {
                            btnScreenshot.innerHTML = "✅ Đã copy ảnh! (Mở Zalo dán ngay)";
                            btnScreenshot.style.background = "linear-gradient(135deg, #4CAF50, #388E3C)";
                            setTimeout(() => {
                                btnScreenshot.innerHTML = originalText;
                                btnScreenshot.style.background = ""; 
                            }, 4000);
                        }).catch(function() {
                            fallbackDownload(canvas, btnScreenshot, originalText);
                        });
                    } catch (e) {
                        fallbackDownload(canvas, btnScreenshot, originalText);
                    }
                }
            });
        });
    }

    function fallbackDownload(canvas, btn, originalText) {
        showToast("Hệ thống đã tự động tải bảng điểm về máy của bạn!", "warning");
        let link = document.createElement('a');
        link.download = 'ThanhTich-HSK1-Bai2.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
        btn.innerHTML = originalText;
    }

    // ===== KHỞI ĐỘNG =====
    window.onload = () => {
        renderHanziCards();
        renderVocabCards();
    };
</script>
</body>
</html>
