            { id: 96, text: "What is indicated about Cordova?", options: { A: "Offering tours", B: "Increase budget", C: "Road expansion project", D: "New regulations" }, correct: "C" },
            { id: 97, text: "What is NOT implied about Ms. Cantu?", options: { A: "Values landmark", B: "Worked with Pachenco", C: "Disagrees with Barnwell", D: "Read May 6 article" }, correct: "B" },
            { id: 98, text: "The word 'countless' is closest in meaning to:", options: { A: "Numerous", B: "Unrecorded", C: "Insignificant", D: "Registered" }, correct: "A" },
            { id: 99, text: "Why congratulate CPS members?", options: { A: "New leadership", B: "In newspaper", C: "Influenced city decision", D: "Secured funding" }, correct: "C" },
            { id: 100, text: "What is suggested about CPS members?", options: { A: "Repaired structure", B: "Meet every Thursday", C: "Spoke at Helman Square", D: "Live in Eastside" }, correct: "C" }
        ]
    }
];

let currentIndex = 0;
const userAnswers = {};

function renderView() {
    const data = quizData[currentIndex];
    document.getElementById('passage-container').innerHTML = data.passage;
    
    let qHtml = '';
    data.questions.forEach(q => {
        qHtml += `<div class="question-block">
            <p class="q-text">Question ${q.id}: ${q.text}</p>
            <div class="options">`;
        for(let opt in q.options) {
            const selected = userAnswers[q.id] === opt ? 'selected' : '';
            qHtml += `<label class="option-label ${selected}">
                <input type="radio" name="q${q.id}" value="${opt}" ${userAnswers[q.id] === opt ? 'checked' : ''} onchange="selectOpt(${q.id}, '${opt}')">
                ${opt}. ${q.options[opt]}
            </label>`;
        }
        qHtml += `</div></div>`;
    });
    document.getElementById('questions-container').innerHTML = qHtml;
    document.getElementById('progress-text').innerText = `Passage ${currentIndex + 1} / ${quizData.length}`;
    
    document.getElementById('btn-prev').style.display = currentIndex === 0 ? 'none' : 'block';
    document.getElementById('btn-next').style.display = currentIndex === quizData.length - 1 ? 'none' : 'block';
    document.getElementById('btn-submit').style.display = currentIndex === quizData.length - 1 ? 'block' : 'none';
    
    document.querySelector('.main-content').scrollTo(0,0);
}

function selectOpt(qid, opt) {
    userAnswers[qid] = opt;
    renderView();
}

function changePassage(dir) {
    currentIndex += dir;
    renderView();
}

function submitQuiz() {
    let score = 0;
    quizData.forEach(p => {
        p.questions.forEach(q => {
            if(userAnswers[q.id] === q.correct) score++;
        });
    });
    document.getElementById('score-display').innerText = `${score} / 54`;
    document.getElementById('result-overlay').style.display = 'flex';
}

renderView();
</script>

</html>
