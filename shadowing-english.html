<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadowing English | SnapEnglish</title>
  <link rel="icon" type="image/png" href="ảnh.png">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-dark: #2c3e50;
            --text-muted: #4a5568;
            --accent: #667eea;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Pastel gradient background */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%; /* Full screen width */
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Glassmorphism Header */
        .header-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 50px;
            text-align: center;
            margin-bottom: 50px;
            width: 95%;
            max-width: 1200px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        h1 {
            margin: 0 0 10px 0;
            color: var(--text-dark);
            font-weight: 800;
            font-size: 2.8rem;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0 0 30px 0;
        }

        /* Search Bar */
        .search-box {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            color: #333;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            outline: none;
            background: #ffffff;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        /* Scientific Full-width Grid */
        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1600px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* Glassmorphism Cards */
        .lesson-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 160px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.65);
        }

        .lesson-number {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .lesson-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 15px 0;
        }

        .lesson-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.5);
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-muted);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .play-icon {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .lesson-card:hover .play-icon {
            transform: scale(1.1);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 1.2rem;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-glass">
            <h1>Vocal Shadowing</h1>
            <p class="subtitle">Search, select, and start your pronunciation training.</p>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="Search for a shadowing lesson (e.g., Shadowing 3)...">
            </div>
        </header>

        <div class="lesson-grid" id="lessonGrid">
            </div>
    </div>

    <script>
        // Mảng tự động tạo 20 bài học để làm mẫu. Có thể tăng số lượng tùy ý.
        const totalLessons = 20;
        const lessons = Array.from({ length: totalLessons }, (_, i) => ({
            id: i + 1,
            title: `Shadowing ${i + 1}`,
            link: `lesson-${i + 1}-shadowing.html`,
            tag: 'Pronunciation'
        }));

        const grid = document.getElementById('lessonGrid');
        const searchInput = document.getElementById('searchInput');

        // Hàm render danh sách bài học
        function renderLessons(filterText = '') {
            grid.innerHTML = '';
            
            // Lọc bài học theo từ khóa tìm kiếm
            const filtered = lessons.filter(lesson => 
                lesson.title.toLowerCase().includes(filterText.toLowerCase())
            );

            // Xử lý khi không tìm thấy kết quả
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">No lessons match your search criteria.</div>';
                return;
            }

            // In các thẻ ra giao diện
            filtered.forEach(lesson => {
                const card = document.createElement('a');
                card.href = lesson.link;
                card.className = 'lesson-card';
                card.innerHTML = `
                    <div>
                        <div class="lesson-number">Lesson ${lesson.id}</div>
                        <h2 class="lesson-title">${lesson.title}</h2>
                    </div>
                    <div class="lesson-meta">
                        <span class="status-badge">${lesson.tag}</span>
                        <div class="play-icon">▶</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Khởi tạo hiển thị toàn bộ bài học khi tải trang
        renderLessons();

        // Lắng nghe sự kiện gõ phím để tìm kiếm real-time
        searchInput.addEventListener('input', (e) => {
            renderLessons(e.target.value);
        });
    </script>
</body>
</html>
