<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Journey Planner | SnapEnglish</title>
  <link rel="icon" type="image/png" href="ảnh.png">
    <style>
        :root {
            --bg-color: #FDF9F1;
            --primary-color: #DDA7A5; /* Hồng đất */
            --secondary-color: #B2D8D8; /* Xanh ngọc */
            --accent-color: #8C7A80;
            --text-main: #5C4B51;
            --white: #FFFFFF;
            --border-light: #E8E2D9;
            --shadow: 0 8px 24px rgba(92, 75, 81, 0.08);
            --radius: 14px;
            --warning-bg: #FFF3E0;
            --warning-text: #E65100;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--white);
            max-width: 850px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 35px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.9em;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.95em;
            margin-bottom: 30px;
        }

        /* Form Inputs */
        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-light);
            border-radius: 10px;
            font-size: 1em;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--secondary-color); }
        .input-group input::placeholder { color: #B0A5A8; font-size: 0.9em; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #C89593; transform: translateY(-2px); }
        
        .btn-reset {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            margin-top: 30px;
        }
        .btn-reset:hover { background-color: var(--primary-color); color: var(--white); transform: none; }

        /* Advice / Warning Box */
        .advice-box {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 5px solid #FF9800;
            margin-bottom: 25px;
            font-size: 0.95em;
            line-height: 1.5;
            display: none; /* Ẩn mặc định */
        }

        /* Progress Bar */
        .progress-wrapper { margin: 20px 0 30px 0; }
        .progress-bg {
            background-color: var(--border-light);
            height: 12px;
            border-radius: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: var(--secondary-color);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 10px;
        }

        /* Table/Grid Styles */
        .week-block {
            border: 2px solid var(--border-light);
            border-radius: var(--radius);
            margin-bottom: 30px;
            overflow: hidden;
            background: var(--white);
        }

        .week-header {
            background-color: rgba(178, 216, 216, 0.2);
            padding: 18px 20px;
            border-bottom: 2px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .week-title {
            color: #4A8C8C;
            font-size: 1.1em;
            font-weight: bold;
            margin: 0;
        }

        .day-row {
            display: flex;
            border-bottom: 1px solid var(--border-light);
            transition: background-color 0.2s;
        }

        .day-row:last-child { border-bottom: none; }
        .day-row:hover { background-color: rgba(253, 249, 241, 0.5); }

        .day-label {
            width: 110px;
            padding: 15px;
            background-color: rgba(232, 226, 217, 0.2);
            font-weight: 600;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-light);
            flex-shrink: 0;
            text-align: center;
        }

        .task-list {
            padding: 12px 18px;
            flex-grow: 1;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 8px 0;
        }

        .task-item input[type="checkbox"] {
            margin-top: 4px;
            margin-right: 14px;
            width: 18px;
            height: 18px;
            accent-color: var(--secondary-color);
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-text {
            font-size: 0.95em;
            line-height: 1.5;
            color: var(--text-main);
            transition: 0.3s;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #B0A5A8;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .day-row { flex-direction: column; }
            .day-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border-light); padding: 10px 15px; justify-content: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Bản Đồ Chinh Phục TOEIC</h1>
        <p class="subtitle">Lộ trình được thiết kế chi tiết, tối ưu hóa theo năng lực và thời gian của riêng bạn.</p>
        
        <div class="input-row">
            <div class="input-group">
                <label>Điểm TOEIC hiện tại:</label>
                <input type="number" id="currentScore" placeholder="VD: 500" min="0" max="990">
            </div>
            <div class="input-group">
                <label>Điểm mục tiêu:</label>
                <input type="number" id="targetScore" placeholder="VD: 750" min="0" max="990">
            </div>
            <div class="input-group">
                <label>Thời gian (Tháng):</label>
                <input type="number" id="months" placeholder="Để trống hệ thống sẽ tự tính">
            </div>
        </div>
        <button onclick="generateRoadmap()">Phân Tích & Tạo Lộ Trình</button>
    </div>

    <div id="roadmap-screen" class="hidden">
        <h1>Lộ Trình Học Tập</h1>
        <p class="subtitle" id="roadmap-summary"></p>
        
        <div id="advice-box" class="advice-box"></div>

        <div class="progress-wrapper">
            <div class="progress-bg">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-stats">
                <span id="progress-text">Đã hoàn thành: 0%</span>
                <span id="task-count">0/0 Nhiệm vụ</span>
            </div>
        </div>

        <div id="planner-container"></div>

        <button class="btn-reset" onclick="resetRoadmap()">Xóa Toàn Bộ & Cài Đặt Lại</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'snap_english_dynamic_planner';

    // Toàn bộ giáo trình được chia nhỏ thành 80 Tasks rải từ 0 đến 990 điểm
    const masterCurriculum = [
        // GIAI ĐOẠN 1: Nền tảng (0 - 350)
        "Nhận diện 4 loại từ chính (Danh, Động, Tính, Trạng) qua hậu tố (-tion, -ment, -ful, -ive, -ate, -ly).",
        "Học kỹ năng phân biệt phát âm dễ nhầm lẫn (copy/coffee, late/rate) và nối âm, lược âm.",
        "Ngữ pháp: Nắm vững Thì Hiện tại đơn & Hiện tại tiếp diễn (Dấu hiệu và cách dùng trong Part 1).",
        "Luyện Part 1: Tranh tả một người (Tập trung vào động từ V-ing).",
        "Luyện Part 1: Tranh tả nhiều người & Tranh phong cảnh/sự vật.",
        "Ngữ pháp: Thì Quá khứ đơn & Tương lai đơn.",
        "Part 2: Luyện nghe câu hỏi Wh- (Who, What, Which).",
        "Ngữ pháp: Thể bị động (Passive Voice) - Ứng dụng cực nhiều trong Part 1 & 5.",
        "Part 2: Luyện dạng câu hỏi Where, When. Áp dụng phương pháp Dictation (Chép chính tả).",
        "Part 2: Luyện dạng câu hỏi How, Why. Kết hợp Shadowing (Nói nhại) để luyện phản xạ.",
        "Ngữ pháp: Câu điều kiện loại 1, 2, 3.",
        "Part 2: Luyện câu hỏi Yes/No và Câu hỏi lựa chọn (Or).",
        "Part 2: Câu hỏi gián tiếp, câu hỏi đuôi và câu trần thuật.",
        "Ngữ pháp: Mệnh đề quan hệ cơ bản (who, which, that).",
        "Làm quen Part 3: Từ vựng & Hội thoại tình huống công sở, buổi họp.",
        "Làm quen Part 3: Tình huống tư vấn khách hàng, mua sắm.",
        "Làm quen Part 4: Bài nói ngắn về tin nhắn thoại (Voicemail).",
        "Làm quen Part 4: Thông báo nội bộ & Bản tin thời tiết/giao thông.",
        "Làm bài Mini Test Part 1, 2, 3, 4 để đánh giá tổng hợp.",
        
        // GIAI ĐOẠN 2: Tăng tốc (350 - 550)
        "Ngữ pháp: Bổ sung 4 thì hoàn thành (Đặc biệt Quá khứ hoàn thành và Tương lai hoàn thành).",
        "Học từ vựng theo cụm (Collocations) - Chủ đề Marketing & Office (vd: meet the requirements).",
        "Ngữ pháp: Danh động từ (Gerund) & Động từ nguyên thể (To V).",
        "Kỹ năng Nghe: Nắm chắc Part 1 & 2 để tránh bẫy. Làm quen kỹ năng Paraphrasing.",
        "Ngữ pháp: Động từ khuyết thiếu (Modal verbs) và Sự hòa hợp chủ vị.",
        "Part 3 & 4: Tập kỹ năng Scan (Quét) câu hỏi và đáp án trước khi audio phát.",
        "Ngữ pháp: Câu trực tiếp - gián tiếp.",
        "Kỹ năng Đọc Part 7: Luyện Skimming (Đọc lướt lấy ý chính) với bài Single Passage.",
        "Ngữ pháp: Rút gọn mệnh đề quan hệ (Dùng V-ing cho chủ động, V-ed cho bị động).",
        "Từ vựng: Chủ đề Shipping, HR & Finance.",
        "Kỹ năng Đọc Part 7: Luyện Scanning (Đọc tìm chi tiết). Phân bổ 20-25p cho Part 5, 5-7p cho Part 6.",
        "Ngữ pháp: Câu giả định (Subjunctive) - Thường gặp trong Part 5.",
        "Giải Mini Test Reading: Bắt buộc tra cứu và dịch toàn bộ câu sai.",
        "Luyện Part 3: Phân tích sâu các đoạn hội thoại có nhiều bẫy Paraphrase.",
        "Luyện Part 4: Nghe chép chính tả 3 bài nói ngắn khó.",
        "Tổng ôn 12 chủ điểm ngữ pháp trọng tâm TOEIC.",
        
        // GIAI ĐOẠN 3: Luyện Đề (550 - 750)
        "Ngữ pháp nâng cao: Câu so sánh kép (The more... the more...).",
        "Từ vựng: Nâng cấp vốn từ lên mức B1, B2 (Mở rộng từ đồng nghĩa).",
        "Ngữ pháp nâng cao: Câu điều kiện hỗn hợp.",
        "Giải đề Nghe (Đề 1): Ghi lại số câu sai. Nghe đi nghe lại kết hợp đọc Transcript.",
        "Ngữ pháp: Các cặp liên từ (Both...and, Not only...but also, Either...or).",
        "Giải đề Đọc (Đề 1): Bấm giờ chuẩn 75 phút. Chữa bài, dịch lại toàn bộ để học từ mới.",
        "Chữa lỗi đề 1: Dùng Oxford Practice Grammar hoặc Grammar in Use để lấp lỗ hổng ngữ pháp.",
        "Giải đề Nghe (Đề 2): Tập trung sửa phát âm dựa vào Transcript các câu làm sai.",
        "Giải đề Đọc (Đề 2): Phân tích nguyên nhân sai (Do từ vựng, ngữ pháp hay bẫy?).",
        "Luyện Part 7 Double Passages: Tìm mối liên hệ giữa 2 đoạn văn.",
        "Luyện Part 7 Triple Passages: Chiến thuật phân bổ thời gian không bị đuối.",
        "Giải Full Test 1 (Bấm giờ 120 phút liên tục).",
        "Phân tích Full Test 1: Mổ xẻ từng câu sai, lập bảng từ vựng mới.",
        "Giải Full Test 2 (Bấm giờ 120 phút liên tục).",
        "Phân tích Full Test 2: Rút ra quy luật bẫy của đề thi.",
        
        // GIAI ĐOẠN 4: Bứt phá (750 - 980+)
        "Chiến lược điểm tối đa: Thiết lập tư duy đạt 990 để duy trì tập trung cao độ 120 phút.",
        "Rèn Tư duy phản biện (Critical Thinking): Phân tích câu hỏi Main Idea (thường ở đầu) vs Detail (thường ở thân).",
        "Giải bộ đề ETS (2016/2024): Đề Nghe Test 1 (Giọng chuẩn 99% thi thật).",
        "Chiến thuật Đọc ngược: Giải Part 7 ngay đầu tiên (30-40p) khi não bộ tỉnh táo nhất, sau đó lùi về Part 6, Part 5.",
        "Giải ETS Đọc Test 1: Bấm giờ 70 phút (Ép thời gian).",
        "Phân tích bẫy Part 5: Rà soát bẫy thể giả định, từ vựng đa nghĩa, đảo ngữ.",
        "Giải ETS Nghe Test 2: Nghe tốc độ 1.2x để tăng phản xạ phòng thi.",
        "Lập sổ tay bứt phá: Ghi lại toàn bộ ngữ pháp lạ, từ vựng dễ nhầm lẫn từ các đề đã giải.",
        "Chuẩn bị tâm lý (Calm): Luyện thiền 10 phút. Tập thói quen chờ mọi người ổn định thao tác rồi mới làm bài.",
        "Giải ETS Full Test Cuối (Mô phỏng thi thật 100% không gián đoạn).",
        "Tổng rà soát sổ tay lỗi sai trước ngày thi. Nghỉ ngơi trọn vẹn."
    ];

    window.onload = function() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) renderRoadmap(JSON.parse(savedData));
    };

    // Hàm chuyển đổi điểm số thành tỷ lệ % tiến trình trong giáo trình (0 -> 1)
    function getCurriculumRatio(score) {
        if (score <= 350) return (score / 350) * 0.35; // Giai đoạn 1 chiếm 35% list
        if (score <= 550) return 0.35 + ((score - 350) / 200) * 0.25; // Giai đoạn 2 chiếm 25%
        if (score <= 750) return 0.60 + ((score - 550) / 200) * 0.25; // Giai đoạn 3 chiếm 25%
        return 0.85 + ((score - 750) / 240) * 0.15; // Giai đoạn 4 chiếm 15%
    }

    function generateRoadmap() {
        let current = parseInt(document.getElementById('currentScore').value);
        let target = parseInt(document.getElementById('targetScore').value);
        let userMonths = document.getElementById('months').value;

        if (isNaN(current) || isNaN(target) || current >= target || current < 0 || target > 990) {
            alert('Vui lòng nhập điểm hiện tại và mục tiêu hợp lệ (Mục tiêu phải lớn hơn hiện tại).');
            return;
        }

        // Tính thời gian tối ưu (Quy tắc ngầm: ~100 điểm cần 1.5 - 2 tháng)
        let pointGap = target - current;
        let recommendedMonths = Math.max(1, Math.round(pointGap / 100 * 1.5));
        let months = userMonths ? parseFloat(userMonths) : recommendedMonths;
        let isRushed = (months < recommendedMonths * 0.6); // Nếu thời gian học < 60% thời gian khuyến nghị

        // Xác định Start Index và End Index trong masterCurriculum
        let startIndex = Math.floor(getCurriculumRatio(current) * masterCurriculum.length);
        let endIndex = Math.ceil(getCurriculumRatio(target) * masterCurriculum.length);
        
        // Cắt mảng bài học (Tạo sự nối tiếp liền mạch, học sinh không nhận ra sự ngắt quãng giai đoạn)
        if(startIndex >= endIndex) endIndex = startIndex + 3; // Fallback an toàn
        if(endIndex > masterCurriculum.length) endIndex = masterCurriculum.length;
        
        let selectedTasks = masterCurriculum.slice(startIndex, endIndex);
        
        // Thuật toán phân bổ bài tập vào các ngày
        let totalDays = Math.ceil(months * 28); // 4 tuần/tháng * 7 ngày
        let plan = { current, target, months, isRushed, recommendedMonths, weeks: [] };

        let taskDistribution = Array.from({length: totalDays}, () => []);
        
        // Dàn đều bài chính
        selectedTasks.forEach((task, i) => {
            let dayIndex = Math.floor((i / selectedTasks.length) * totalDays);
            taskDistribution[dayIndex].push(task);
        });

        // Điền bài phụ (Filler) cho những ngày trống hoặc thêm bài ôn tập
        let fillerTasks = [
            "Ôn tập từ vựng đã học trong sổ tay.",
            "Luyện Nghe chép chính tả (Dictation) 1 bài tự chọn.",
            "Đọc dịch 1 bài Part 7 và rút trích từ vựng.",
            "Làm 20 câu Part 5 trên nền tảng online để giữ phong độ."
        ];

        taskDistribution.forEach((dayTasks, i) => {
            if (dayTasks.length === 0) {
                dayTasks.push(fillerTasks[i % fillerTasks.length]);
            }
        });

        // Nhóm vào các tuần
        let totalWeeks = Math.ceil(totalDays / 7);
        for (let w = 0; w < totalWeeks; w++) {
            let weekDays = [];
            for (let d = 0; d < 7; d++) {
                let dayIndex = w * 7 + d;
                if (dayIndex < totalDays) {
                    let tasksObj = taskDistribution[dayIndex].map((t, idx) => ({
                        id: `w${w}d${d}t${idx}`, text: t, completed: false
                    }));
                    weekDays.push({ dayNum: d + 1, tasks: tasksObj });
                }
            }
            plan.weeks.push({ weekNum: w + 1, days: weekDays });
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        renderRoadmap(plan);
    }

    function renderRoadmap(plan) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('roadmap-screen').classList.remove('hidden');
        document.getElementById('roadmap-summary').innerText = 
            `Chặng đường: ${plan.current} ➔ ${plan.target} TOEIC trong ${plan.months} tháng (${plan.weeks.length} tuần)`;

        // Xử lý Cảnh báo
        const adviceBox = document.getElementById('advice-box');
        if (plan.isRushed) {
            adviceBox.style.display = 'block';
            adviceBox.innerHTML = `💡 <b>Lời khuyên chân thành:</b> Mục tiêu tăng ${plan.target - plan.current} điểm trong ${plan.months} tháng là khá thử thách (Lộ trình chuẩn thường cần khoảng ${plan.recommendedMonths} tháng). Nhưng đừng lo! Hệ thống đã tự động dồn nén kiến thức và tăng số bài học mỗi ngày. Hãy cố gắng kỷ luật 200% công lực, kết quả sẽ xứng đáng!`;
        } else {
            adviceBox.style.display = 'none';
        }

        const container = document.getElementById('planner-container');
        container.innerHTML = '';
        
        let totalTasks = 0;
        let completedTasks = 0;

        plan.weeks.forEach((week, wIndex) => {
            const weekBlock = document.createElement('div');
            weekBlock.className = 'week-block';

            const header = document.createElement('div');
            header.className = 'week-header';
            header.innerHTML = `<h3 class="week-title">Tuần ${week.weekNum}</h3>`;
            weekBlock.appendChild(header);

            week.days.forEach((day, dIndex) => {
                const dayRow = document.createElement('div');
                dayRow.className = 'day-row';

                const dayLabel = document.createElement('div');
                dayLabel.className = 'day-label';
                dayLabel.innerText = `Ngày ${day.dayNum}`;
                
                const taskList = document.createElement('div');
                taskList.className = 'task-list';

                day.tasks.forEach((task, tIndex) => {
                    totalTasks++;
                    if (task.completed) completedTasks++;

                    const taskItem = document.createElement('div');
                    taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.completed;
                    checkbox.onchange = (e) => updateTaskStatus(wIndex, dIndex, tIndex, e.target.checked);

                    const text = document.createElement('div');
                    text.className = 'task-text';
                    text.innerText = task.text;

                    taskItem.appendChild(checkbox);
                    taskItem.appendChild(text);
                    taskList.appendChild(taskItem);
                });

                dayRow.appendChild(dayLabel);
                dayRow.appendChild(taskList);
                weekBlock.appendChild(dayRow);
            });

            container.appendChild(weekBlock);
        });

        const percent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `Đã hoàn thành: ${percent}%`;
        document.getElementById('task-count').innerText = `${completedTasks}/${totalTasks} Nhiệm vụ`;
    }

    function updateTaskStatus(wIndex, dIndex, tIndex, isCompleted) {
        let plan = JSON.parse(localStorage.getItem(STORAGE_KEY));
        plan.weeks[wIndex].days[dIndex].tasks[tIndex].completed = isCompleted;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        renderRoadmap(plan);
    }

    function resetRoadmap() {
        if(confirm('Bạn có chắc chắn muốn xóa toàn bộ lộ trình và bắt đầu lại từ đầu?')) {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('roadmap-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }
    }
</script>

</body>
</html>
