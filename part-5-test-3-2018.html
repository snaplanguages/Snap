<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 5 - Test 3 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fce7f3 100%);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

       .quiz-container {
            background-color: #ffffff; 
            width: 100%; 
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            box-sizing: border-box;
            border: 2px solid #e2e8f0; 
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px dashed #cbd5e1;
            padding-bottom: 15px;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #6366f1; 
            margin: 0;
        }

        .progress {
            font-size: 16px;
            font-weight: 600;
            color: #4f46e5; 
            background-color: #e0e7ff;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.6;
            font-weight: 600;
            margin-bottom: 25px;
            color: #1e293b;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .option {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background-color: #f1f5f9;
            border-color: #94a3b8;
        }

        .option.selected {
            background-color: #e0e7ff; 
            border-color: #6366f1;
            color: #4f46e5;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-prev { background-color: #f1f5f9; color: #64748b; }
        .btn-prev:hover { background-color: #e2e8f0; color: #334155; }
        .btn-next { background-color: #6366f1; color: #fff; margin-left: auto; }
        .btn-next:hover { background-color: #4f46e5; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        .btn-submit { background-color: #f43f5e; color: #fff; margin-left: auto; display: none; }
        .btn-submit:hover { background-color: #e11d48; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(244, 63, 94, 0.4); }
        .btn-explain { background-color: #8b5cf6; color: #fff; margin-top: 20px; }

        #result-container { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        .score-circle {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 20px auto; color: white; font-size: 28px; font-weight: 700;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }

        /* OVERLAYS */
        .custom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .custom-modal {
            background: white; padding: 40px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            width: 90%; max-width: 450px; text-align: center; border: 2px solid #e0e7ff;
        }
        .timer-box {
            font-size: 18px; font-weight: 700; color: #f43f5e;
            background: #fff1f2; padding: 6px 15px; border-radius: 15px; border: 2px solid #ffe4e6; margin-left: 15px;
        }
        #timeInput { width: 80px; padding: 8px; font-size: 18px; text-align: center; border-radius: 10px; border: 2px solid #e2e8f0; }
        .start-btn { background: #6366f1; color: white; border: none; padding: 12px 35px; border-radius: 50px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz-app">
    <div id="question-container">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <h2 class="title">SnapEnglish - Part 5 Test 3</h2>
                <div class="timer-box">⏱ <span id="timer">00:00</span></div>
            </div>
            <div class="progress" id="progress-text">Câu 1 / 30</div>
        </div>
        
        <div class="question-text" id="question-text">Đang tải...</div>
        <div class="options" id="options-container"></div>

        <div class="controls">
            <button class="btn btn-prev hidden" id="btn-prev" onclick="prevQuestion()">Quay lại</button>
            <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">Tiếp theo</button>
            <button class="btn btn-submit" id="btn-submit" onclick="askSubmit()">Nộp bài</button>
        </div>
    </div>

    <div id="result-container">
        <h2 class="title" style="margin-bottom: 25px;">Kết quả của bạn</h2>
        <div class="score-circle" id="score-display">0/30</div>
        <div class="result-message" id="result-message">Chúc mừng bạn đã hoàn thành!</div>
        <a href="part-5-test-3-answers-reading.html" class="btn btn-explain">Xem Giải Thích Chi Tiết</a>
    </div>
</div>

<div id="setupOverlay" class="custom-overlay" style="display: flex;">
    <div class="custom-modal">
        <h2 style="color: #6366f1;">Sẵn sàng chưa? 🚀</h2>
        <p style="color: #64748b; margin-bottom: 20px;">Cài đặt thời gian làm bài Part 5 (Gợi ý: 15-20 phút)</p>
        <div style="margin-bottom: 25px;">
            <input type="number" id="timeInput" value="20" min="1"> <span style="font-weight: bold;">phút</span>
        </div>
        <button class="start-btn" onclick="startTestActual()">BẮT ĐẦU NGAY</button>
    </div>
</div>

<div id="confirmOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>Nộp bài?</h2>
        <p>Bạn có chắc muốn kết thúc bài thi và xem đáp án không?</p>
        <div style="display:flex; gap:15px; margin-top:25px;">
            <button class="btn btn-prev" style="flex:1;" onclick="closeConfirmModal()">Hủy</button>
            <button class="btn btn-next" style="flex:1; background:#f43f5e;" onclick="submitQuiz()">Nộp bài</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        { id: 101, q: "All shelves in the holiday merchandise section need to remain ----- stocked.", options: ["full", "fully", "fuller", "fullest"], a: "fully" },
        { id: 102, q: "------ to the exercise room is included with your stay at the Bayland Hotel.", options: ["Access", "Accessed", "Accessing", "Accessible"], a: "Access" },
        { id: 103, q: "Mr. Okello's promotion means that ------ will supervise a larger team.", options: ["he", "his", "him", "himself"], a: "he" },
        { id: 104, q: "Juniper Worldwide, Inc., will be ------ payroll service providers on January 1.", options: ["changing", "attending", "holding", "turning"], a: "changing" },
        { id: 105, q: "The Valletta Visitor Centre offers daily boat rides ------ the city's historic waterfront.", options: ["between", "along", "below", "apart"], a: "along" },
        { id: 106, q: "Ultrora Action's T-Pro tennis shoe is the lightest ------ on the market right now.", options: ["that", "any", "one", "either"], a: "one" },
        { id: 107, q: "Duram Biscuit Corp. is able to ------ good deals with its wholesale suppliers.", options: ["negotiating", "negotiates", "negotiated", "negotiate"], a: "negotiate" },
        { id: 108, q: "At Razani Marketing, there are ------ opportunities for professional advancement.", options: ["plenty", "each", "very", "many"], a: "many" },
        { id: 109, q: "Parking on Dahakno Street will be prohibited for the next few days ------ emergency repairs to water lines.", options: ["so that", "as a result", "in order to", "because of"], a: "because of" },
        { id: 110, q: "Accountants applying for the training must obtain a ------- from their supervisor.", options: ["referring", "referred", "referral", "refer"], a: "referral" },
        { id: 111, q: "The evaluation report will be completed ------ after the auditors inspect the laboratory.", options: ["when", "only", "still", "most"], a: "only" },
        { id: 112, q: "In light of our recent expansion, it will be ------ to hire another administrative assistant by June 1.", options: ["necessitating", "necessary", "necessarily", "necessities"], a: "necessary" },
        { id: 113, q: "Due to low registration, the communications workshop scheduled for July 2 will be postponed ------ further notice.", options: ["until", "onto", "since", "all"], a: "until" },
        { id: 114, q: "The initial response to the beta version of the software allows us to be ------ optimistic about future product sales.", options: ["fairness", "fairest", "fairly", "fair"], a: "fairly" },
        { id: 115, q: "Orvale School's business mentors are retired executives with a ------ of expertise across a wide range of industries.", options: ["wealth", "height", "labor", "fame"], a: "wealth" },
        { id: 116, q: "Thank you for your interest in our ------- line of compact refrigerators.", options: ["update", "updated", "updates", "updating"], a: "updated" },
        { id: 117, q: "The judges may begin to review the entries ------ the deadline for submitting slogans has passed.", options: ["how", "nor", "now that", "whether"], a: "now that" },
        { id: 118, q: "On his daily radio show, Trade Biz, Antonio Koslor ------ business news from all over the globe.", options: ["analysis", "analyzer", "analyzes", "analyzing"], a: "analyzes" },
        { id: 119, q: "The purchase of The New Lagos Reporter will not lead to changes ------ editorial staff.", options: ["in", "again", "positions", "ultimately"], a: "in" },
        { id: 120, q: "Professor Reginald Layke's proposal for an additional course in business management was approved in a ------ short time.", options: ["surprised", "surprise", "surprisingly", "surprising"], a: "surprisingly" },
        { id: 121, q: "Candell Science Museum trustees are expected to be ------ of all the museum's operations.", options: ["aware", "current", "serious", "alert"], a: "aware" },
        { id: 122, q: "With the completion of its airport, Honokai Island's tourism ------ has improved dramatically.", options: ["economical", "economic", "economize", "economy"], a: "economy" },
        { id: 123, q: "Brock's Bistro has requested that we ------ the number of dinner guests by Monday.", options: ["personify", "magnify", "specify", "testify"], a: "specify" },
        { id: 124, q: "Doi Textiles, Inc., is well-known ------ the fashion world as being a trendsetter for young women's clothing.", options: ["toward", "throughout", "regarding", "aboard"], a: "throughout" },
        { id: 125, q: "To sign up for any class at Routen Academy, simply complete the online ------ form.", options: ["enrollment", "inventory", "complaint", "solicitation"], a: "enrollment" },
        { id: 126, q: "A reception will be held to introduce the newly ------ director of marketing to the employees.", options: ["appoint", "appoints", "appointed", "appointing"], a: "appointed" },
        { id: 127, q: "To fill two vacant positions on its benefits committee, Adidion Labs ------ employees who are ready for a challenge.", options: ["seeking", "is seeking", "are sought", "have been sought"], a: "is seeking" },
        { id: 128, q: "The software for tracking orders has been successful as it has greatly ------ decreased time spent on the task.", options: ["haltingly", "intimately", "permissibly", "markedly"], a: "markedly" },
        { id: 129, q: "Lately the community sports program has had a surplus of volunteers, ------ are students.", options: ["inasmuch as", "the reason being", "because of them", "most of whom"], a: "most of whom" },
        { id: 130, q: "Please use the attached survey to let us know how ------ your recent stay at the Copper Mine Inn was.", options: ["knowledgeable", "considerable", "enjoyable", "available"], a: "enjoyable" }
    ];

    let currentQuestionIndex = 0;
    const userAnswers = new Array(questions.length).fill(null);
    let testDuration = 0;
    let timerInterval = null;

    function startTestActual() {
        document.getElementById('setupOverlay').style.display = 'none';
        let minutes = parseInt(document.getElementById('timeInput').value) || 20;
        testDuration = minutes * 60;
        loadQuestion();
        startTimer();
    }

    function startTimer() {
        const display = document.getElementById("timer");
        timerInterval = setInterval(() => {
            let m = Math.floor(testDuration / 60);
            let s = testDuration % 60;
            display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (--testDuration < 0) { clearInterval(timerInterval); submitQuiz(); }
        }, 1000);
    }

    function loadQuestion() {
        const q = questions[currentQuestionIndex];
        document.getElementById("question-text").textContent = `${q.id}. ${q.q}`;
        document.getElementById("progress-text").textContent = `Câu ${currentQuestionIndex + 1} / ${questions.length}`;
        
        const optionsEl = document.getElementById("options-container");
        optionsEl.innerHTML = "";
        q.options.forEach(opt => {
            const div = document.createElement("div");
            div.className = `option ${userAnswers[currentQuestionIndex] === opt ? 'selected' : ''}`;
            div.textContent = opt;
            div.onclick = () => {
                userAnswers[currentQuestionIndex] = opt;
                loadQuestion();
            };
            optionsEl.appendChild(div);
        });

        document.getElementById("btn-prev").classList.toggle("hidden", currentQuestionIndex === 0);
        const isLast = currentQuestionIndex === questions.length - 1;
        document.getElementById("btn-next").classList.toggle("hidden", isLast);
        document.getElementById("btn-submit").style.display = isLast ? "block" : "none";
    }

    function prevQuestion() { if(currentQuestionIndex > 0) { currentQuestionIndex--; loadQuestion(); } }
    function nextQuestion() { if(currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; loadQuestion(); } }
    function askSubmit() { document.getElementById('confirmOverlay').style.display = 'flex'; }
    function closeConfirmModal() { document.getElementById('confirmOverlay').style.display = 'none'; }

    function submitQuiz() {
        clearInterval(timerInterval);
        localStorage.setItem('snapEnglish_test3_answers', JSON.stringify(userAnswers));
        let score = userAnswers.filter((ans, i) => ans === questions[i].a).length;
        document.getElementById("question-container").style.display = "none";
        document.getElementById("confirmOverlay").style.display = "none";
        document.getElementById("result-container").style.display = "block";
        document.getElementById("score-display").textContent = `${score}/${questions.length}`;
    }
</script>
</body>
</html>
